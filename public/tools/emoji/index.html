<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emoji Picker - Free Online Tool | imseankim.com</title>
  <meta name="description" content="Browse, search, and copy 500+ emojis organized by category. Skin tone selector, recently used tracking, and instant clipboard copy. Free online emoji picker.">
  <meta property="og:title" content="Emoji Picker - Free Online Tool | imseankim.com">
  <meta property="og:description" content="Browse, search, and copy 500+ emojis. Organized by category with skin tone support and instant copy.">
  <meta property="og:url" content="https://imseankim.com/tools/emoji">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://imseankim.com/tools/emoji">
  <link rel="stylesheet" href="/shared/style.css">
  <style>
    .tool-content {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .tool-title {
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 8px;
    }

    .tool-subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      letter-spacing: 1px;
      margin-bottom: 36px;
    }

    /* Search */
    .search-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      align-items: center;
    }

    .search-input {
      flex: 1;
      background: #141414;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 12px 16px;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus {
      border-color: #444;
    }

    .search-input::placeholder {
      color: #555;
    }

    /* Skin Tone Selector */
    .skin-tone-selector {
      display: flex;
      gap: 4px;
      background: #141414;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 6px 10px;
      align-items: center;
    }

    .skin-tone-btn {
      width: 28px;
      height: 28px;
      border: 2px solid transparent;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      transition: border-color 0.2s, transform 0.15s;
      padding: 0;
    }

    .skin-tone-btn:hover {
      transform: scale(1.15);
    }

    .skin-tone-btn.active {
      border-color: #666;
    }

    /* Categories */
    .category-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }

    .category-tabs::-webkit-scrollbar {
      height: 4px;
    }

    .category-tabs::-webkit-scrollbar-track {
      background: transparent;
    }

    .category-tabs::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 2px;
    }

    .category-tab {
      background: #141414;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 8px 14px;
      color: #888;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .category-tab:hover {
      color: #ccc;
      border-color: #333;
    }

    .category-tab.active {
      color: #e0e0e0;
      border-color: #444;
      background: #1a1a1a;
    }

    /* Preview Panel */
    .preview-panel {
      background: #141414;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      min-height: 72px;
      transition: opacity 0.2s;
    }

    .preview-emoji {
      font-size: 3rem;
      line-height: 1;
      min-width: 56px;
      text-align: center;
    }

    .preview-info {
      flex: 1;
    }

    .preview-name {
      color: #e0e0e0;
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 4px;
      text-transform: capitalize;
    }

    .preview-unicode {
      color: #666;
      font-size: 0.8rem;
      font-family: var(--font-mono, monospace);
      letter-spacing: 1px;
    }

    .preview-placeholder {
      color: #444;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
    }

    /* Recently Used */
    .section-label {
      color: #555;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .recent-section {
      margin-bottom: 20px;
    }

    .recent-grid {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .recent-empty {
      color: #333;
      font-size: 0.8rem;
      font-style: italic;
      padding: 4px 0;
    }

    /* Emoji Grid */
    .emoji-grid-container {
      background: #141414;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 16px;
      max-height: 520px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }

    .emoji-grid-container::-webkit-scrollbar {
      width: 6px;
    }

    .emoji-grid-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .emoji-grid-container::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 3px;
    }

    .emoji-category-label {
      color: #555;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin: 16px 0 10px;
      font-weight: 500;
    }

    .emoji-category-label:first-child {
      margin-top: 0;
    }

    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
      gap: 4px;
    }

    .emoji-btn {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      background: none;
      border: 1px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      padding: 0;
    }

    .emoji-btn:hover {
      background: #1e1e1e;
      border-color: #333;
      transform: scale(1.15);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a1a;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* No Results */
    .no-results {
      text-align: center;
      color: #444;
      padding: 40px 20px;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
    }

    @media (max-width: 600px) {
      .tool-content {
        padding: 24px 16px 60px;
      }
      .search-row {
        flex-direction: column;
      }
      .skin-tone-selector {
        justify-content: center;
      }
      .category-tabs {
        gap: 3px;
      }
      .category-tab {
        padding: 6px 10px;
        font-size: 0.72rem;
      }
      .emoji-grid {
        grid-template-columns: repeat(auto-fill, minmax(38px, 1fr));
      }
      .emoji-btn {
        width: 38px;
        height: 38px;
        font-size: 1.3rem;
      }
      .preview-emoji {
        font-size: 2.4rem;
        min-width: 44px;
      }
    }
  </style>

    // Build skin tone capable set
    CATEGORIES.forEach(cat => {
      cat.emojis.forEach(e => {
        if (e[2] === 1) SKIN_TONE_CAPABLE.add(e[0]);
      });
    });

    let currentCategory = 'all';
    let currentSkinTone = 0;
    let recentEmojis = JSON.parse(sessionStorage.getItem('recentEmojis') || '[]');

    const searchInput = document.getElementById('searchInput');
    const categoryTabs = document.getElementById('categoryTabs');
    const emojiContainer = document.getElementById('emojiContainer');
    const previewPanel = document.getElementById('previewPanel');
    const recentSection = document.getElementById('recentSection');
    const recentGrid = document.getElementById('recentGrid');
    const skinToneSelector = document.getElementById('skinToneSelector');
    const toast = document.getElementById('toast');

    // Build skin tone buttons
    SKIN_TONES.forEach((tone, i) => {
      const btn = document.createElement('button');
      btn.className = 'skin-tone-btn' + (i === 0 ? ' active' : '');
      btn.textContent = tone.emoji;
      btn.title = tone.label;
      btn.addEventListener('click', () => {
        currentSkinTone = i;
        skinToneSelector.querySelectorAll('.skin-tone-btn').forEach((b, j) => {
          b.classList.toggle('active', j === i);
        });
        renderEmojis();
        renderRecent();
      });
      skinToneSelector.appendChild(btn);
    });

    // Build category tabs
    const allTab = document.createElement('button');
    allTab.className = 'category-tab active';
    allTab.textContent = 'All';
    allTab.dataset.category = 'all';
    allTab.addEventListener('click', () => selectCategory('all'));
    categoryTabs.appendChild(allTab);

    CATEGORIES.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'category-tab';
      btn.textContent = cat.icon + ' ' + cat.name;
      btn.dataset.category = cat.name;
      btn.addEventListener('click', () => selectCategory(cat.name));
      categoryTabs.appendChild(btn);
    });

    function selectCategory(name) {
      currentCategory = name;
      categoryTabs.querySelectorAll('.category-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.category === name);
      });
      searchInput.value = '';
      renderEmojis();
      emojiContainer.scrollTop = 0;
    }

    function applySkinTone(emoji) {
      if (currentSkinTone === 0 || !SKIN_TONE_CAPABLE.has(emoji)) return emoji;
      const modifier = SKIN_TONES[currentSkinTone].modifier;
      // Insert skin tone modifier after first code point
      const codePoints = [...emoji];
      if (codePoints.length >= 1) {
        return codePoints[0] + modifier + codePoints.slice(1).join('');
      }
      return emoji + modifier;
    }

    function getUnicode(emoji) {
      return [...emoji].map(cp => 'U+' + cp.codePointAt(0).toString(16).toUpperCase().padStart(4, '0')).join(' ');
    }

    function createEmojiButton(emoji, name) {
      const displayed = applySkinTone(emoji);
      const btn = document.createElement('button');
      btn.className = 'emoji-btn';
      btn.textContent = displayed;
      btn.title = name;

      btn.addEventListener('mouseenter', () => {
        previewPanel.innerHTML = '<span class="preview-emoji">' + displayed + '</span>' +
          '<div class="preview-info"><div class="preview-name">' + name + '</div>' +
          '<div class="preview-unicode">' + getUnicode(displayed) + '</div></div>';
      });

      btn.addEventListener('mouseleave', () => {
        previewPanel.innerHTML = '<span class="preview-placeholder">Hover over an emoji to preview</span>';
      });

      btn.addEventListener('click', () => {
        copyEmoji(displayed, name);
      });

      return btn;
    }

    function copyEmoji(emoji, name) {
      navigator.clipboard.writeText(emoji).then(() => {
        showToast('Copied ' + emoji + ' ' + name);
        addRecent(emoji, name);
      }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = emoji;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('Copied ' + emoji + ' ' + name);
        addRecent(emoji, name);
      });
    }

    function addRecent(emoji, name) {
      // Remove if already exists (use base emoji for dedup)
      recentEmojis = recentEmojis.filter(r => r[0] !== emoji);
      recentEmojis.unshift([emoji, name]);
      if (recentEmojis.length > 20) recentEmojis = recentEmojis.slice(0, 20);
      sessionStorage.setItem('recentEmojis', JSON.stringify(recentEmojis));
      renderRecent();
    }

    function renderRecent() {
      if (recentEmojis.length === 0) {
        recentSection.style.display = 'none';
        return;
      }
      recentSection.style.display = 'block';
      recentGrid.innerHTML = '';
      recentEmojis.forEach(([emoji, name]) => {
        const btn = document.createElement('button');
        btn.className = 'emoji-btn';
        btn.textContent = emoji;
        btn.title = name;
        btn.addEventListener('mouseenter', () => {
          previewPanel.innerHTML = '<span class="preview-emoji">' + emoji + '</span>' +
            '<div class="preview-info"><div class="preview-name">' + name + '</div>' +
            '<div class="preview-unicode">' + getUnicode(emoji) + '</div></div>';
        });
        btn.addEventListener('mouseleave', () => {
          previewPanel.innerHTML = '<span class="preview-placeholder">Hover over an emoji to preview</span>';
        });
        btn.addEventListener('click', () => copyEmoji(emoji, name));
        recentGrid.appendChild(btn);
      });
    }

    function renderEmojis() {
      const query = searchInput.value.toLowerCase().trim();
      emojiContainer.innerHTML = '';

      const categoriesToShow = currentCategory === 'all'
        ? CATEGORIES
        : CATEGORIES.filter(c => c.name === currentCategory);

      let totalShown = 0;

      categoriesToShow.forEach(cat => {
        const filtered = cat.emojis.filter(e => {
          if (!query) return true;
          return e[1].toLowerCase().includes(query);
        });

        if (filtered.length === 0) return;

        if (currentCategory === 'all' || query) {
          const label = document.createElement('div');
          label.className = 'emoji-category-label';
          label.textContent = cat.name;
          emojiContainer.appendChild(label);
        }

        const grid = document.createElement('div');
        grid.className = 'emoji-grid';

        filtered.forEach(([emoji, name]) => {
          grid.appendChild(createEmojiButton(emoji, name));
          totalShown++;
        });

        emojiContainer.appendChild(grid);
      });

      if (totalShown === 0) {
        emojiContainer.innerHTML = '<div class="no-results">No emojis found for "' + query + '"</div>';
      }
    }

    let showToastTimeout;
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(showToastTimeout);
      showToastTimeout = setTimeout(() => toast.classList.remove('show'), 1800);
    }

    // Search handler with debounce
    let searchTimeout;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        if (searchInput.value.trim()) {
          // Show all categories when searching
          categoryTabs.querySelectorAll('.category-tab').forEach(t => {
            t.classList.toggle('active', t.dataset.category === 'all');
          });
          currentCategory = 'all';
        }
        renderEmojis();
      }, 150);
    });

    // Initial render
    renderEmojis();
    renderRecent();
  })();
  </script>
</body>
</html>
