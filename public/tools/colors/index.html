<script>
// ============ State ============
let baseH = 205, baseS = 75, baseL = 55;
let myColors = [];
let savedPalettes = JSON.parse(localStorage.getItem('colorStudioPalettes') || '[]');
let currentExportType = 'css';
let dragIdx = null;

// ============ Utility ============
function hslToHex(h, s, l) {
  h = ((h % 360) + 360) % 360;
  s = Math.max(0, Math.min(100, s));
  l = Math.max(0, Math.min(100, l));
  const s1 = s / 100, l1 = l / 100;
  const a = s1 * Math.min(l1, 1 - l1);
  const f = n => {
    const k = (n + h / 30) % 12;
    const c = l1 - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
    return Math.round(255 * c).toString(16).padStart(2, '0');
  };
  return `#${f(0)}${f(8)}${f(4)}`;
}

function hexToHsl(hex) {
  let r = parseInt(hex.slice(1,3),16)/255;
  let g = parseInt(hex.slice(3,5),16)/255;
  let b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max+min)/2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h = ((g-b)/d + (g<b?6:0))/6; break;
      case g: h = ((b-r)/d + 2)/6; break;
      case b: h = ((r-g)/d + 4)/6; break;
    }
  }
  return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
}

function lum(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  return 0.299*r + 0.587*g + 0.114*b;
}

function textColor(hex) { return lum(hex) > 0.5 ? '#000' : '#fff'; }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1400);
}

function copyHex(hex) {
  navigator.clipboard.writeText(hex);
  toast(`Copied ${hex}`);
}

// ============ Controls ============
function togglePanel(el) {
  el.classList.toggle('collapsed');
  el.nextElementSibling.classList.toggle('hidden');
}

function syncControls() {
  document.getElementById('hueSlider').value = baseH;
  document.getElementById('satSlider').value = baseS;
  document.getElementById('lightSlider').value = baseL;
  document.getElementById('hueVal').textContent = baseH;
  document.getElementById('satVal').textContent = baseS;
  document.getElementById('lightVal').textContent = baseL;
  const hex = hslToHex(baseH, baseS, baseL);
  document.getElementById('baseColor').value = hex;
  document.getElementById('baseHex').value = hex;
}

function onSliderChange() {
  baseH = +document.getElementById('hueSlider').value;
  baseS = +document.getElementById('satSlider').value;
  baseL = +document.getElementById('lightSlider').value;
  syncControls();
  generate();
}

function onBaseChange() {
  const hex = document.getElementById('baseColor').value;
  [baseH, baseS, baseL] = hexToHsl(hex);
  syncControls();
  generate();
}

function onHexInput() {
  let hex = document.getElementById('baseHex').value.trim();
  if (!hex.startsWith('#')) hex = '#' + hex;
  if (/^#[0-9a-fA-F]{6}$/.test(hex)) {
    [baseH, baseS, baseL] = hexToHsl(hex);
    syncControls();
    generate();
  }
}

function randomizeBase() {
  baseH = Math.floor(Math.random() * 360);
  baseS = 50 + Math.floor(Math.random() * 40);
  baseL = 40 + Math.floor(Math.random() * 30);
  syncControls();
  generate();
}

// ============ Generation ============
function getHarmonyHues() {
  const type = document.getElementById('harmonyType').value;
  const spread = +document.getElementById('spreadSlider').value;
  switch(type) {
    case 'complementary': return [baseH, baseH + 180];
    case 'analogous': return [baseH - spread, baseH, baseH + spread];
    case 'triadic': return [baseH, baseH + 120, baseH + 240];
    case 'split': return [baseH, baseH + 150, baseH + 210];
    case 'tetradic': return [baseH, baseH + 90, baseH + 180, baseH + 270];
    case 'monochromatic': return [baseH];
  }
}

function generateColors() {
  const count = +document.getElementById('countSlider').value;
  document.getElementById('countVal').textContent = count;
  document.getElementById('spreadVal').textContent = document.getElementById('spreadSlider').value;
  const hues = getHarmonyHues();
  const type = document.getElementById('harmonyType').value;
  const colors = [];

  if (type === 'monochromatic') {
    for (let i = 0; i < count; i++) {
      const l = 15 + (70 / (count - 1)) * i;
      const s = baseS - 10 + Math.random() * 20;
      colors.push(hslToHex(baseH, s, l));
    }
  } else {
    const perHue = Math.ceil(count / hues.length);
    for (const h of hues) {
      for (let i = 0; i < perHue && colors.length < count; i++) {
        const lOff = (i - perHue/2) * 8;
        const sOff = (i - perHue/2) * 5;
        colors.push(hslToHex(h, baseS + sOff, baseL + lOff));
      }
    }
  }
  return colors;
}

function generate() {
  document.getElementById('stepsVal').textContent = document.getElementById('stepsSlider').value;
  renderGenerated();
  renderTints();
  renderSpectrum();
  renderGradients();
  renderWheel();
  renderHarmonies();
}

// ============ Render: Generated ============
function renderGenerated() {
  const colors = generateColors();
  const row = document.getElementById('genRow');
  row.innerHTML = '';
  colors.forEach(hex => {
    const card = document.createElement('div');
    card.className = 'cs-gen-card';
    card.style.background = hex;
    card.innerHTML = `
      <span class="cs-hex-label" style="color:${textColor(hex)}">${hex}</span>
      <div class="cs-add-btn" onclick="event.stopPropagation();addToMyPalette('${hex}')">+</div>
    `;
    card.onclick = () => copyHex(hex);
    row.appendChild(card);
  });
}

// ============ Render: Tints ============
function renderTints() {
  const area = document.getElementById('tintsArea');
  area.innerHTML = '';
  const steps = +document.getElementById('stepsSlider').value;
  const hues = getHarmonyHues();
  hues.forEach(h => {
    const row = document.createElement('div');
    row.className = 'cs-gen-row';
    for (let i = 0; i < steps; i++) {
      const l = 5 + (90 / (steps - 1)) * i;
      const hex = hslToHex(h, baseS, l);
      const card = document.createElement('div');
      card.className = 'cs-gen-card';
      card.style.background = hex;
      card.innerHTML = `
        <span class="cs-hex-label" style="color:${textColor(hex)}">${hex}</span>
        <div class="cs-add-btn" onclick="event.stopPropagation();addToMyPalette('${hex}')">+</div>
      `;
      card.onclick = () => copyHex(hex);
      row.appendChild(card);
    }
    area.appendChild(row);
  });
}

// ============ Render: Spectrum ============
function renderSpectrum() {
  const area = document.getElementById('spectrumArea');
  area.innerHTML = '';
  const hex = hslToHex(baseH, baseS, baseL);
  const spectrums = [
    `linear-gradient(90deg, ${hslToHex(baseH,baseS,10)}, ${hex}, ${hslToHex(baseH,baseS,95)})`,
    `linear-gradient(90deg, ${hslToHex(baseH,0,baseL)}, ${hex}, ${hslToHex(baseH,100,baseL)})`,
    `linear-gradient(90deg, ${hslToHex(0,baseS,baseL)}, ${hslToHex(60,baseS,baseL)}, ${hslToHex(120,baseS,baseL)}, ${hslToHex(180,baseS,baseL)}, ${hslToHex(240,baseS,baseL)}, ${hslToHex(300,baseS,baseL)}, ${hslToHex(360,baseS,baseL)})`,
    `linear-gradient(90deg, ${hex}, ${hslToHex(baseH+180, baseS, baseL)})`,
  ];
  spectrums.forEach(g => {
    const bar = document.createElement('div');
    bar.className = 'cs-spectrum-bar';
    bar.style.background = g;
    area.appendChild(bar);
  });
}

// ============ Render: Gradients ============
function renderGradients() {
  const area = document.getElementById('gradientArea');
  area.innerHTML = '';
  const h = baseH;
  const presets = [
    { c: [hslToHex(h,80,55), hslToHex(h+40,70,45)], n: 'Warm Shift' },
    { c: [hslToHex(h,80,55), hslToHex(h+180,70,55)], n: 'Complement' },
    { c: [hslToHex(h,90,65), hslToHex(h+120,80,50)], n: 'Triadic' },
    { c: [hslToHex(h,70,80), hslToHex(h+60,60,90)], n: 'Pastel' },
    { c: [hslToHex(h,80,20), hslToHex(h,80,55)], n: 'Deep Rise' },
    { c: [hslToHex(h,100,55), hslToHex(h+30,100,55), hslToHex(h+60,100,55)], n: 'Rainbow' },
    { c: [hslToHex(h,20,25), hslToHex(h,60,55)], n: 'Muted' },
    { c: [hslToHex(h,80,55), '#ffffff'], n: 'Fade Out' },
    { c: ['#000000', hslToHex(h,80,55)], n: 'From Dark' },
    { c: [hslToHex(h,80,55), hslToHex(h+90,80,55), hslToHex(h+180,80,55)], n: 'Spectrum' },
    { c: [hslToHex(h,40,80), hslToHex(h+180,40,80)], n: 'Soft Dual' },
    { c: [hslToHex(h,90,45), hslToHex(h+60,90,65), hslToHex(h+120,90,45)], n: 'Vivid Arc' },
  ];
  presets.forEach(p => {
    const card = document.createElement('div');
    card.className = 'cs-gradient-card';
    const grad = `linear-gradient(135deg, ${p.c.join(', ')})`;
    card.style.background = grad;
    card.innerHTML = `<span class="cs-g-name">${p.n}</span>`;
    card.onclick = () => { navigator.clipboard.writeText(grad); toast('Gradient copied'); };
    area.appendChild(card);
  });
}

// ============ Render: Wheel ============
function renderWheel() {
  const area = document.getElementById('wheelArea');
  area.innerHTML = '';
  const cx = area.offsetWidth / 2 || 350;
  const cy = 155;
  const rings = [
    { count: 24, r: 140, size: 40, s: baseS, l: baseL },
    { count: 16, r: 90, s: Math.max(20, baseS - 20), size: 32, l: Math.min(85, baseL + 15) },
    { count: 8, r: 38, size: 26, s: Math.max(10, baseS - 40), l: Math.min(90, baseL + 25) },
  ];
  rings.forEach(ring => {
    for (let i = 0; i < ring.count; i++) {
      const angle = (i / ring.count) * Math.PI * 2 - Math.PI / 2;
      const x = cx + Math.cos(angle) * ring.r;
      const y = cy + Math.sin(angle) * ring.r;
      const hue = (i / ring.count) * 360;
      const hex = hslToHex(hue, ring.s, ring.l);
      const dot = document.createElement('div');
      dot.className = 'cs-wheel-dot';
      dot.style.cssText = `
        width:${ring.size}px;height:${ring.size}px;background:${hex};color:${hex};
        left:${x - ring.size/2}px;top:${y - ring.size/2}px;
        box-shadow: 0 0 0 2px rgba(0,0,0,0.3);
      `;
      dot.innerHTML = `<div class="cs-dot-add" onclick="event.stopPropagation();addToMyPalette('${hex}')">+</div>`;
      dot.onclick = () => copyHex(hex);
      area.appendChild(dot);
    }
  });
}

// ============ Render: Harmonies ============
function renderHarmonies() {
  const area = document.getElementById('harmonyArea');
  area.innerHTML = '';
  const types = [
    { n: 'Complementary', h: [baseH, baseH+180] },
    { n: 'Triadic', h: [baseH, baseH+120, baseH+240] },
    { n: 'Analogous', h: [baseH-30, baseH, baseH+30] },
    { n: 'Split Comp.', h: [baseH, baseH+150, baseH+210] },
    { n: 'Tetradic', h: [baseH, baseH+90, baseH+180, baseH+270] },
    { n: 'Warm', h: [baseH, baseH+15, baseH+30, baseH+45] },
    { n: 'Cool', h: [baseH+180, baseH+195, baseH+210, baseH+225] },
    { n: 'Monochrome', h: [baseH, baseH, baseH, baseH], lOff: [-20, -5, 10, 25] },
    { n: 'Pastel', h: [baseH, baseH+72, baseH+144, baseH+216, baseH+288], sOff: -25, lOff2: 25 },
  ];
  types.forEach(t => {
    const set = document.createElement('div');
    set.className = 'cs-harmony-set';
    set.onclick = () => {
      const colors = t.h.map((h, i) => {
        const lO = t.lOff ? t.lOff[i] : (t.lOff2 || 0);
        return hslToHex(h, baseS + (t.sOff || 0), baseL + lO);
      });
      colors.forEach(c => addToMyPalette(c));
      toast(`Added ${colors.length} colors`);
    };
    const colorsHtml = t.h.map((h, i) => {
      const lO = t.lOff ? t.lOff[i] : (t.lOff2 || 0);
      return `<div style="background:${hslToHex(h, baseS + (t.sOff||0), baseL + lO)}"></div>`;
    }).join('');
    set.innerHTML = `<div class="cs-harmony-name">${t.n}</div><div class="cs-harmony-colors">${colorsHtml}</div>`;
    area.appendChild(set);
  });
}

// ============ My Palette ============
function addToMyPalette(hex) {
  myColors.push(hex);
  renderMyPalette();
  toast(`Added ${hex}`);
}

function removeFromPalette(idx) {
  myColors.splice(idx, 1);
  renderMyPalette();
}

function clearMyPalette() {
  myColors = [];
  renderMyPalette();
}

function addGeneratedToPalette() {
  const colors = generateColors();
  colors.forEach(c => myColors.push(c));
  renderMyPalette();
  toast(`Added ${colors.length} colors`);
}

function renderMyPalette() {
  const area = document.getElementById('myPalette');
  if (myColors.length === 0) {
    area.innerHTML = '<div class="cs-empty-msg">Click + on any color to add it here</div>';
    return;
  }
  area.innerHTML = '';
  myColors.forEach((hex, i) => {
    const sw = document.createElement('div');
    sw.className = 'cs-my-swatch';
    sw.style.background = hex;
    sw.draggable = true;
    sw.dataset.index = i;
    sw.innerHTML = `
      <span class="cs-swatch-hex" style="color:${textColor(hex)}">${hex}</span>
      <div class="cs-swatch-remove" onclick="event.stopPropagation();removeFromPalette(${i})">&#215;</div>
    `;
    sw.onclick = () => copyHex(hex);
    sw.ondragstart = e => { dragIdx = i; sw.classList.add('dragging'); };
    sw.ondragend = () => { sw.classList.remove('dragging'); dragIdx = null; };
    sw.ondragover = e => e.preventDefault();
    sw.ondrop = e => {
      e.preventDefault();
      if (dragIdx !== null && dragIdx !== i) {
        const item = myColors.splice(dragIdx, 1)[0];
        myColors.splice(i, 0, item);
        renderMyPalette();
      }
    };
    area.appendChild(sw);
  });
}

// ============ Save / Load ============
function savePalette() {
  if (myColors.length === 0) { toast('Palette is empty'); return; }
  const name = document.getElementById('paletteName').value || 'Untitled';
  savedPalettes.push({ name, colors: [...myColors], date: Date.now() });
  localStorage.setItem('colorStudioPalettes', JSON.stringify(savedPalettes));
  renderSaved();
  toast(`Saved "${name}"`);
}

function loadPalette(idx) {
  myColors = [...savedPalettes[idx].colors];
  document.getElementById('paletteName').value = savedPalettes[idx].name;
  renderMyPalette();
  toast(`Loaded "${savedPalettes[idx].name}"`);
}

function deletePalette(idx) {
  savedPalettes.splice(idx, 1);
  localStorage.setItem('colorStudioPalettes', JSON.stringify(savedPalettes));
  renderSaved();
}

function renderSaved() {
  const area = document.getElementById('savedList');
  if (savedPalettes.length === 0) {
    area.innerHTML = '<div class="cs-empty-msg">No saved palettes</div>';
    return;
  }
  area.innerHTML = '';
  savedPalettes.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'cs-saved-item';
    item.onclick = () => loadPalette(i);
    const swatches = p.colors.slice(0, 8).map(c => `<div style="background:${c}"></div>`).join('');
    item.innerHTML = `
      <span class="cs-saved-name">${p.name}</span>
      <div class="cs-saved-colors">${swatches}</div>
      <span class="cs-saved-delete" onclick="event.stopPropagation();deletePalette(${i})">&#215;</span>
    `;
    area.appendChild(item);
  });
}

// ============ Export ============
function openExport(type) {
  currentExportType = type;
  const modal = document.getElementById('exportModal');
  const title = document.getElementById('exportTitle');
  const code = document.getElementById('exportCode');
  const colors = myColors.length > 0 ? myColors : generateColors();

  title.textContent = `Export \u2014 ${type.toUpperCase()}`;

  if (type === 'css') {
    code.value = `:root {\n${colors.map((c, i) => `  --color-${i + 1}: ${c};`).join('\n')}\n}`;
  } else if (type === 'json') {
    code.value = JSON.stringify({ name: document.getElementById('paletteName').value, colors }, null, 2);
  } else if (type === 'svg') {
    const w = colors.length * 60;
    const rects = colors.map((c, i) => `  <rect x="${i * 60}" y="0" width="60" height="60" fill="${c}"/>`).join('\n');
    code.value = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="60">\n${rects}\n</svg>`;
  } else if (type === 'tailwind') {
    const obj = {};
    colors.forEach((c, i) => obj[`${(i + 1) * 100}`] = c);
    code.value = `// tailwind.config.js\nmodule.exports = {\n  theme: {\n    extend: {\n      colors: {\n        custom: ${JSON.stringify(obj, null, 10).replace(/"/g, "'")}\n      }\n    }\n  }\n}`;
  }
  modal.classList.add('show');
}

function closeExport() { document.getElementById('exportModal').classList.remove('show'); }

function copyExport() {
  navigator.clipboard.writeText(document.getElementById('exportCode').value);
  toast('Copied to clipboard');
}

function downloadExport() {
  const ext = { css: 'css', json: 'json', svg: 'svg', tailwind: 'js' }[currentExportType];
  const blob = new Blob([document.getElementById('exportCode').value], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `palette.${ext}`;
  a.click();
}

document.getElementById('exportModal').onclick = e => {
  if (e.target === document.getElementById('exportModal')) closeExport();
};

// ============ Init ============
syncControls();
generate();
renderMyPalette();
renderSaved();
</script>
