<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Formatter & Validator - Free Online Tool | imseankim.com</title>
  <meta name="description" content="Free online JSON formatter, validator, and minifier. Syntax highlighting, tree view, error detection with line numbers. Fast, private, no data sent to servers.">
  <meta name="keywords" content="JSON formatter, JSON validator, JSON minifier, JSON beautifier, online JSON tool, syntax highlighting">
  <meta property="og:title" content="JSON Formatter & Validator - Free Online Tool | imseankim.com">
  <meta property="og:description" content="Format, validate, and minify JSON with syntax highlighting and tree view.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://imseankim.com/tools/json/">
  <meta name="twitter:card" content="summary">
  <link rel="canonical" href="https://imseankim.com/tools/json/">
  <link rel="stylesheet" href="/shared/style.css">
  <style>
    .json-tool {
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .json-tool h1 {
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .json-tool .subtitle {
      color: var(--text-muted);
      font-size: 0.78rem;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .toolbar .separator {
      width: 1px;
      height: 24px;
      background: var(--border-light);
      margin: 0 4px;
    }

    .toolbar select {
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-light);
      background: var(--bg-input);
      color: var(--text-secondary);
      font-size: 0.75rem;
      cursor: pointer;
      font-family: var(--font-sans);
      letter-spacing: 1px;
      transition: var(--transition);
    }

    .toolbar select:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--border-hover);
    }

    .toggle-btn {
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-light);
      background: var(--bg-input);
      color: var(--text-secondary);
      font-size: 0.75rem;
      cursor: pointer;
      letter-spacing: 1px;
      transition: var(--transition);
      font-family: var(--font-sans);
    }

    .toggle-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--border-hover);
    }

    .toggle-btn.active {
      background: #1a3a5c;
      border-color: #2a5a8c;
      color: #7ab8ff;
    }

    /* Panels */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      min-height: 500px;
    }

    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-header span {
      font-size: 0.72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .panel-header .char-count {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 1px;
      font-family: var(--font-mono);
    }

    /* Input */
    #jsonInput {
      flex: 1;
      width: 100%;
      padding: 16px;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.82rem;
      line-height: 1.6;
      resize: none;
      outline: none;
      tab-size: 2;
    }

    #jsonInput::placeholder {
      color: var(--text-dim);
    }

    /* Output */
    .output-area {
      flex: 1;
      padding: 16px;
      overflow: auto;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* Syntax highlighting */
    .json-key { color: #79b8ff; }
    .json-string { color: #85e89d; }
    .json-number { color: #ffab70; }
    .json-boolean { color: #b392f0; }
    .json-null { color: #f97583; }
    .json-bracket { color: var(--text-secondary); }
    .json-colon { color: var(--text-muted); }

    /* Error */
    .error-msg {
      color: #f97583;
      padding: 16px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      line-height: 1.8;
      flex: 1;
      overflow: auto;
    }

    .error-msg .error-title {
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 0.85rem;
    }

    .error-msg .error-detail {
      color: var(--text-secondary);
      font-size: 0.78rem;
    }

    .error-msg .error-line {
      color: #ffab70;
      margin-top: 4px;
    }

    /* Validation success */
    .valid-msg {
      color: var(--success);
      padding: 16px;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Tree View */
    .tree-view {
      flex: 1;
      padding: 16px;
      overflow: auto;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      line-height: 1.7;
    }

    .tree-node {
      margin-left: 20px;
    }

    .tree-toggle {
      cursor: pointer;
      user-select: none;
      display: inline-block;
      width: 16px;
      text-align: center;
      color: var(--text-muted);
      transition: var(--transition);
    }

    .tree-toggle:hover {
      color: var(--text-primary);
    }

    .tree-key {
      color: #79b8ff;
    }

    .tree-preview {
      color: var(--text-dim);
      font-size: 0.72rem;
    }

    .tree-children {
      overflow: hidden;
    }

    .tree-children.collapsed {
      display: none;
    }

    .tree-value-string { color: #85e89d; }
    .tree-value-number { color: #ffab70; }
    .tree-value-boolean { color: #b392f0; }
    .tree-value-null { color: #f97583; }

    /* Responsive */
    @media (max-width: 768px) {
      .json-tool {
        padding: 16px;
      }

      .panels {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .panel {
        min-height: 300px;
      }

      .toolbar {
        gap: 6px;
      }

      .toolbar .separator {
        display: none;
      }
    }
  </style>
</head>
<body>
  <script src="/shared/header.js"></script>

  <main class="tool-content">
    <div class="json-tool">
      <h1>JSON Formatter & Validator</h1>
      <p class="subtitle">Paste your JSON to format, validate, or minify it</p>

      <div class="toolbar">
        <button class="btn btn-primary" onclick="formatJSON()">Format</button>
        <button class="btn" onclick="minifyJSON()">Minify</button>
        <button class="btn" onclick="validateJSON()">Validate</button>
        <div class="separator"></div>
        <button class="btn" onclick="copyOutput()">Copy</button>
        <button class="btn" onclick="clearAll()">Clear</button>
        <div class="separator"></div>
        <select id="tabSize" onchange="formatJSON()">
          <option value="2">2 Spaces</option>
          <option value="4">4 Spaces</option>
        </select>
        <button class="toggle-btn" id="treeToggle" onclick="toggleTreeView()">Tree View</button>
      </div>

      <div class="panels">
        <div class="panel">
          <div class="panel-header">
            <span>Input</span>
            <span class="char-count" id="inputCount">0 chars</span>
          </div>
          <textarea id="jsonInput" placeholder='Paste your JSON here...\n\nExample:\n{\n  "name": "John",\n  "age": 30,\n  "active": true\n}' spellcheck="false"></textarea>
        </div>

        <div class="panel">
          <div class="panel-header">
            <span>Output</span>
            <span class="char-count" id="outputCount">0 chars</span>
          </div>
          <div class="output-area" id="outputArea"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="/shared/footer.js"></script>
  <script>
    (function() {
      const input = document.getElementById('jsonInput');
      const output = document.getElementById('outputArea');
      const inputCount = document.getElementById('inputCount');
      const outputCount = document.getElementById('outputCount');
      const tabSizeSelect = document.getElementById('tabSize');
      const treeToggleBtn = document.getElementById('treeToggle');

      let isTreeView = false;
      let lastFormattedText = '';

      // Update char count on input
      input.addEventListener('input', function() {
        inputCount.textContent = this.value.length + ' chars';
      });

      // Auto-format on paste
      input.addEventListener('paste', function() {
        setTimeout(() => {
          inputCount.textContent = this.value.length + ' chars';
          if (this.value.trim()) formatJSON();
        }, 0);
      });

      // Tab key inserts spaces
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Tab') {
          e.preventDefault();
          const start = this.selectionStart;
          const end = this.selectionEnd;
          const spaces = ' '.repeat(parseInt(tabSizeSelect.value));
          this.value = this.value.substring(0, start) + spaces + this.value.substring(end);
          this.selectionStart = this.selectionEnd = start + spaces.length;
        }
      });

      // Format JSON
      window.formatJSON = function() {
        const raw = input.value.trim();
        if (!raw) {
          output.innerHTML = '';
          outputCount.textContent = '0 chars';
          return;
        }

        try {
          const parsed = JSON.parse(raw);
          const tabSize = parseInt(tabSizeSelect.value);

          if (isTreeView) {
            renderTreeView(parsed);
          } else {
            const formatted = JSON.stringify(parsed, null, tabSize);
            lastFormattedText = formatted;
            output.innerHTML = syntaxHighlight(formatted);
            outputCount.textContent = formatted.length + ' chars';
          }
        } catch (e) {
          showError(e, raw);
        }
      };

      // Minify JSON
      window.minifyJSON = function() {
        const raw = input.value.trim();
        if (!raw) return;

        try {
          const parsed = JSON.parse(raw);
          const minified = JSON.stringify(parsed);
          lastFormattedText = minified;
          output.innerHTML = syntaxHighlight(minified);
          outputCount.textContent = minified.length + ' chars';
        } catch (e) {
          showError(e, raw);
        }
      };

      // Validate JSON
      window.validateJSON = function() {
        const raw = input.value.trim();
        if (!raw) return;

        try {
          const parsed = JSON.parse(raw);
          const type = Array.isArray(parsed) ? 'Array' : typeof parsed;
          const keys = typeof parsed === 'object' && parsed !== null
            ? (Array.isArray(parsed) ? parsed.length + ' items' : Object.keys(parsed).length + ' keys')
            : '';
          output.innerHTML = '<div class="valid-msg">' +
            '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' +
            ' Valid JSON &mdash; ' + type + (keys ? ' (' + keys + ')' : '') +
            '</div>';
          outputCount.textContent = '';
        } catch (e) {
          showError(e, raw);
        }
      };

      // Copy output
      window.copyOutput = function() {
        const text = lastFormattedText || output.textContent;
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => {
          showToast('Copied to clipboard');
        });
      };

      // Clear
      window.clearAll = function() {
        input.value = '';
        output.innerHTML = '';
        lastFormattedText = '';
        inputCount.textContent = '0 chars';
        outputCount.textContent = '0 chars';
      };

      // Toggle tree view
      window.toggleTreeView = function() {
        isTreeView = !isTreeView;
        treeToggleBtn.classList.toggle('active', isTreeView);
        if (input.value.trim()) formatJSON();
      };

      // Syntax highlighting
      function syntaxHighlight(json) {
        return json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?|\bnull\b)/g,
            function(match) {
              let cls = 'json-number';
              if (/^"/.test(match)) {
                if (/:$/.test(match)) {
                  cls = 'json-key';
                  // Remove trailing colon for wrapping, add it back styled
                  return '<span class="' + cls + '">' + match.slice(0, -1) + '</span><span class="json-colon">:</span>';
                } else {
                  cls = 'json-string';
                }
              } else if (/true|false/.test(match)) {
                cls = 'json-boolean';
              } else if (/null/.test(match)) {
                cls = 'json-null';
              }
              return '<span class="' + cls + '">' + match + '</span>';
            });
      }

      // Error display with line number
      function showError(error, raw) {
        const msg = error.message;
        let lineInfo = '';

        // Try to extract position from error message
        const posMatch = msg.match(/position\s+(\d+)/i);
        if (posMatch) {
          const pos = parseInt(posMatch[1]);
          const before = raw.substring(0, pos);
          const line = (before.match(/\n/g) || []).length + 1;
          const col = pos - before.lastIndexOf('\n');
          lineInfo = '<div class="error-line">Line ' + line + ', Column ' + col + '</div>';
        }

        // Also try "at line X column Y" format
        const lineMatch = msg.match(/line\s+(\d+)\s+column\s+(\d+)/i);
        if (lineMatch && !lineInfo) {
          lineInfo = '<div class="error-line">Line ' + lineMatch[1] + ', Column ' + lineMatch[2] + '</div>';
        }

        output.innerHTML = '<div class="error-msg">' +
          '<div class="error-title">Invalid JSON</div>' +
          '<div class="error-detail">' + escapeHtml(msg) + '</div>' +
          lineInfo +
          '</div>';
        outputCount.textContent = '';
        lastFormattedText = '';
      }

      // Tree view renderer
      function renderTreeView(data) {
        output.innerHTML = '';
        output.className = 'tree-view';
        const tree = buildTree(data, '');
        output.appendChild(tree);
        outputCount.textContent = '';

        // Restore class when switching back
        if (!isTreeView) {
          output.className = 'output-area';
        }
      }

      function buildTree(data, key) {
        const container = document.createElement('div');

        if (data === null) {
          container.innerHTML = (key ? '<span class="tree-key">"' + escapeHtml(key) + '"</span><span class="json-colon">: </span>' : '') +
            '<span class="tree-value-null">null</span>';
          return container;
        }

        if (typeof data !== 'object') {
          let cls = 'tree-value-string';
          let val = '"' + escapeHtml(String(data)) + '"';
          if (typeof data === 'number') { cls = 'tree-value-number'; val = data; }
          if (typeof data === 'boolean') { cls = 'tree-value-boolean'; val = data; }
          container.innerHTML = (key ? '<span class="tree-key">"' + escapeHtml(key) + '"</span><span class="json-colon">: </span>' : '') +
            '<span class="' + cls + '">' + val + '</span>';
          return container;
        }

        const isArray = Array.isArray(data);
        const entries = isArray ? data : Object.entries(data);
        const count = isArray ? data.length : Object.keys(data).length;
        const bracket = isArray ? ['[', ']'] : ['{', '}'];

        // Toggle
        const toggle = document.createElement('span');
        toggle.className = 'tree-toggle';
        toggle.textContent = '\u25BC';

        const label = document.createElement('span');
        label.innerHTML = (key ? '<span class="tree-key">"' + escapeHtml(key) + '"</span><span class="json-colon">: </span>' : '') +
          '<span class="json-bracket">' + bracket[0] + '</span>' +
          ' <span class="tree-preview">' + count + (isArray ? ' items' : ' keys') + '</span>';

        const children = document.createElement('div');
        children.className = 'tree-children tree-node';

        if (isArray) {
          data.forEach(function(item, i) {
            children.appendChild(buildTree(item, ''));
          });
        } else {
          Object.entries(data).forEach(function(entry) {
            children.appendChild(buildTree(entry[1], entry[0]));
          });
        }

        const closing = document.createElement('div');
        closing.innerHTML = '<span class="json-bracket">' + bracket[1] + '</span>';

        toggle.addEventListener('click', function() {
          const collapsed = children.classList.toggle('collapsed');
          toggle.textContent = collapsed ? '\u25B6' : '\u25BC';
        });

        container.appendChild(toggle);
        container.appendChild(label);
        container.appendChild(children);
        container.appendChild(closing);

        return container;
      }

      function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      // Toast
      function showToast(msg) {
        let toast = document.querySelector('.toast');
        if (!toast) {
          toast = document.createElement('div');
          toast.className = 'toast';
          document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
      }

      // Restore output area class when not tree view
      const origFormat = window.formatJSON;
      const origToggle = window.toggleTreeView;
    })();
  </script>
</body>
</html>
