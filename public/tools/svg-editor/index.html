<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG Editor - Free Online Tool | imseankim.com</title>
  <meta name="description" content="Free online SVG editor with drawing tools, layers, live code editing, and export. Create and edit SVG graphics in your browser. Fast, private, no data sent to servers.">
  <meta name="keywords" content="SVG editor, SVG drawing, online SVG tool, SVG creator, vector graphics editor, SVG code editor">
  <meta property="og:title" content="SVG Editor - Free Online Tool | imseankim.com">
  <meta property="og:description" content="Create and edit SVG graphics with drawing tools, layers, and live code editing.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://imseankim.com/tools/svg-editor/">
  <meta name="twitter:card" content="summary">
  <link rel="canonical" href="https://imseankim.com/tools/svg-editor/">
  <link rel="stylesheet" href="/shared/style.css">
  <style>
    .svg-tool {
      padding: 16px 24px;
      max-width: 1600px;
      margin: 0 auto;
    }

    .svg-tool h1 {
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .svg-tool .subtitle {
      color: var(--text-muted);
      font-size: 0.78rem;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    /* Top toolbar */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      padding: 8px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }

    .top-bar .separator {
      width: 1px;
      height: 24px;
      background: var(--border-light);
      margin: 0 4px;
    }

    .top-bar label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .top-bar input[type="number"] {
      width: 60px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-primary);
      padding: 3px 6px;
      font-size: 0.75rem;
      font-family: var(--font-mono);
    }

    .top-bar input[type="number"]:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Layout */
    .editor-layout {
      display: grid;
      grid-template-columns: 48px 1fr 240px;
      gap: 12px;
      height: calc(100vh - 250px);
      min-height: 500px;
    }

    /* Drawing tools sidebar */
    .tools-sidebar {
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px;
      overflow-y: auto;
    }

    .tool-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.65rem;
      font-family: var(--font-sans);
      transition: var(--transition);
      flex-shrink: 0;
    }

    .tool-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .tool-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .tool-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Center area: canvas + code */
    .center-area {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
    }

    /* Canvas */
    .canvas-wrap {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: auto;
      position: relative;
      min-height: 0;
    }

    .canvas-inner {
      position: relative;
      display: inline-block;
      margin: 20px;
    }

    .canvas-inner .grid-bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .canvas-inner svg#main-svg {
      position: relative;
      z-index: 1;
      cursor: crosshair;
    }

    .canvas-inner svg#main-svg .selected {
      outline: 2px dashed var(--accent);
      outline-offset: 2px;
    }

    /* Selection handles */
    .selection-box {
      position: absolute;
      border: 1px dashed var(--accent);
      pointer-events: none;
      z-index: 10;
    }

    /* Code editor */
    .code-section {
      height: 180px;
      min-height: 100px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      display: flex;
      flex-direction: column;
    }

    .code-section .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--text-secondary);
      letter-spacing: 1px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .code-section textarea {
      flex: 1;
      background: var(--bg-input);
      border: none;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      padding: 10px 12px;
      resize: none;
      line-height: 1.5;
      width: 100%;
    }

    .code-section textarea:focus {
      outline: none;
    }

    /* Right panel */
    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      flex-shrink: 0;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--text-secondary);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .panel-body {
      padding: 10px 12px;
    }

    /* Properties */
    .prop-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .prop-row:last-child {
      margin-bottom: 0;
    }

    .prop-label {
      font-size: 0.72rem;
      color: var(--text-secondary);
      width: 56px;
      flex-shrink: 0;
    }

    .prop-row input[type="color"] {
      width: 32px;
      height: 26px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg-input);
      cursor: pointer;
      padding: 1px;
    }

    .prop-row input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 1px;
    }

    .prop-row input[type="color"]::-webkit-color-swatch {
      border: none;
      border-radius: 2px;
    }

    .prop-row input[type="number"],
    .prop-row input[type="text"] {
      flex: 1;
      min-width: 0;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-primary);
      padding: 4px 8px;
      font-size: 0.75rem;
      font-family: var(--font-mono);
    }

    .prop-row input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .prop-row .color-hex {
      flex: 1;
      min-width: 0;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-primary);
      padding: 4px 8px;
      font-size: 0.72rem;
      font-family: var(--font-mono);
    }

    .prop-row .color-hex:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Layers */
    .layers-list {
      max-height: 200px;
      overflow-y: auto;
    }

    .layer-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      font-size: 0.72rem;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: var(--transition);
    }

    .layer-item:last-child {
      border-bottom: none;
    }

    .layer-item:hover {
      background: var(--bg-hover);
    }

    .layer-item.active {
      background: rgba(79, 172, 254, 0.1);
      color: var(--accent);
    }

    .layer-item .layer-name {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .layer-item .layer-actions {
      display: flex;
      gap: 2px;
    }

    .layer-btn {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 3px;
      font-size: 0.7rem;
      transition: var(--transition);
    }

    .layer-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .layer-btn.danger:hover {
      color: var(--danger);
    }

    /* Buttons */
    .btn {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-family: var(--font-sans);
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-input);
      color: var(--text-primary);
      transition: var(--transition);
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--bg-hover);
      border-color: var(--border-light);
    }

    .btn-accent {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn-accent:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .btn-sm {
      padding: 4px 10px;
      font-size: 0.7rem;
    }

    .btn-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* Export panel */
    .export-btns {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .export-btns .btn {
      width: 100%;
      text-align: center;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      color: var(--text-primary);
      padding: 10px 24px;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Hidden file input */
    .hidden-input {
      display: none;
    }

    /* Import modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
    }

    .modal-overlay.hidden {
      display: none;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 24px;
      width: 500px;
      max-width: 90vw;
    }

    .modal h3 {
      font-size: 1rem;
      font-weight: 400;
      margin-bottom: 12px;
    }

    .modal textarea {
      width: 100%;
      height: 200px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      padding: 10px;
      resize: vertical;
      margin-bottom: 12px;
    }

    .modal textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .modal .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .editor-layout {
        grid-template-columns: 48px 1fr;
        height: auto;
      }
      .right-panel {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <script src="/shared/header.js"></script>

  <main class="tool-content">
    <div class="svg-tool">
      <h1>SVG EDITOR</h1>
      <p class="subtitle">Create and edit SVG graphics with drawing tools, layers, and live code</p>

      <!-- Top bar -->
      <div class="top-bar">
        <label>W <input type="number" id="canvas-w" value="800" min="100" max="4000"></label>
        <label>H <input type="number" id="canvas-h" value="600" min="100" max="4000"></label>
        <div class="separator"></div>
        <button class="btn btn-sm" id="btn-grid" title="Toggle grid">Grid</button>
        <button class="btn btn-sm" id="btn-snap" title="Snap to grid">Snap</button>
        <div class="separator"></div>
        <button class="btn btn-sm" id="btn-undo" title="Undo (Ctrl+Z)">Undo</button>
        <button class="btn btn-sm" id="btn-redo" title="Redo (Ctrl+Y)">Redo</button>
        <div class="separator"></div>
        <button class="btn btn-sm" id="btn-import-svg" title="Import SVG code">Import SVG</button>

      <div class="editor-layout">
        <!-- Tools sidebar -->
        <div class="tools-sidebar">

          <button class="tool-btn" data-tool="circle" title="Circle (C)">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>

          <button class="tool-btn" data-tool="ellipse" title="Ellipse (E)">
            <svg viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="10" ry="7"/></svg>

          <button class="tool-btn" data-tool="line" title="Line (L)">
            <svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4"/></svg>
          </button>
          <button class="tool-btn" data-tool="polygon" title="Polygon (P)">
            <svg viewBox="0 0 24 24"><polygon points="12,2 22,20 2,20"/></svg>
          </button>
          <button class="tool-btn" data-tool="path" title="Freehand (F)">
            <svg viewBox="0 0 24 24"><path d="M4 17c2-5 5-8 8-8s4 3 8-5" fill="none"/></svg>

          <button class="tool-btn" data-tool="text" title="Text (T)">

        <!-- Center: canvas + code -->
        <div class="center-area">

        <!-- Right panel -->
        <div class="right-panel">

          <div class="panel">

            <div class="panel-body" id="props-panel">

                <span class="prop-label">Width</span>

    <!-- Import modal -->

  <script src="/shared/footer.js"></script>
  <script>
  (function() {
    'use strict';

    // --- State ---
    const NS = 'http://www.w3.org/2000/svg';
    let svgW = 800, svgH = 600;
    let currentTool = 'select';
    let selectedEl = null;
    let showGrid = false;
    let snapGrid = false;
    let gridSize = 20;
    let drawing = false;
    let startX = 0, startY = 0;
    let tempEl = null;
    let pathPoints = [];
    let polygonPoints = [];
    let polygonTempEl = null;
    let history = [];
    let historyIndex = -1;
    const MAX_HISTORY = 80;

    // --- Elements ---
    const canvasInner = document.getElementById('canvas-inner');
    const canvasWrap = document.getElementById('canvas-wrap');
    const codeEditor = document.getElementById('code-editor');
    const layersList = document.getElementById('layers-list');
    const canvasWInput = document.getElementById('canvas-w');
    const canvasHInput = document.getElementById('canvas-h');

    // Property inputs
    const propFill = document.getElementById('prop-fill');
    const propFillHex = document.getElementById('prop-fill-hex');
    const propStroke = document.getElementById('prop-stroke');
    const propStrokeHex = document.getElementById('prop-stroke-hex');
    const propStrokeW = document.getElementById('prop-stroke-w');
    const propOpacity = document.getElementById('prop-opacity');
    const propRotate = document.getElementById('prop-rotate');

    // --- Initialize SVG ---
    let mainSvg;
    function initSvg() {
      canvasInner.innerHTML = '';
      mainSvg = document.createElementNS(NS, 'svg');
      mainSvg.setAttribute('id', 'main-svg');
      mainSvg.setAttribute('xmlns', NS);
      mainSvg.setAttribute('width', svgW);
      mainSvg.setAttribute('height', svgH);
      mainSvg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);
      mainSvg.style.background = '#1e1e1e';
      canvasInner.appendChild(mainSvg);
      renderGrid();
      attachSvgEvents();
    }

    // --- Grid ---
    function renderGrid() {
      const existing = canvasInner.querySelector('.grid-svg');
      if (existing) existing.remove();

      if (!showGrid) return;

      const g = document.createElementNS(NS, 'svg');
      g.classList.add('grid-svg');
      g.setAttribute('width', svgW);
      g.setAttribute('height', svgH);
      g.style.position = 'absolute';
      g.style.top = '0';
      g.style.left = '0';
      g.style.pointerEvents = 'none';
      g.style.zIndex = '0';

      const defs = document.createElementNS(NS, 'defs');
      const pattern = document.createElementNS(NS, 'pattern');
      pattern.setAttribute('id', 'grid-pattern');
      pattern.setAttribute('width', gridSize);
      pattern.setAttribute('height', gridSize);
      pattern.setAttribute('patternUnits', 'userSpaceOnUse');

      const path = document.createElementNS(NS, 'path');
      path.setAttribute('d', `M ${gridSize} 0 L 0 0 0 ${gridSize}`);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', 'rgba(255,255,255,0.06)');
      path.setAttribute('stroke-width', '0.5');
      pattern.appendChild(path);
      defs.appendChild(pattern);
      g.appendChild(defs);

      const rect = document.createElementNS(NS, 'rect');
      rect.setAttribute('width', '100%');
      rect.setAttribute('height', '100%');
      rect.setAttribute('fill', 'url(#grid-pattern)');
      g.appendChild(rect);

      canvasInner.insertBefore(g, mainSvg);
    }

    function snapVal(v) {
      return snapGrid ? Math.round(v / gridSize) * gridSize : v;
    }

    // --- History (Undo/Redo) ---
    function saveState() {
      const state = mainSvg.innerHTML;
      // Trim future states
      if (historyIndex < history.length - 1) {
        history = history.slice(0, historyIndex + 1);
      }
      history.push(state);
      if (history.length > MAX_HISTORY) {
        history.shift();
      }
      historyIndex = history.length - 1;
    }

    function undo() {
      if (historyIndex > 0) {
        historyIndex--;
        mainSvg.innerHTML = history[historyIndex];
        deselectAll();
        syncCodeFromCanvas();
        refreshLayers();
      }
    }

    function redo() {
      if (historyIndex < history.length - 1) {
        historyIndex++;
        mainSvg.innerHTML = history[historyIndex];
        deselectAll();
        syncCodeFromCanvas();
        refreshLayers();
      }
    }

    // --- Sync code editor <-> canvas ---
    function syncCodeFromCanvas() {
      const serializer = new XMLSerializer();
      let raw = serializer.serializeToString(mainSvg);
      // Pretty print basic
      raw = raw.replace(/></g, '>\n<');
      codeEditor.value = raw;
    }

    function syncCanvasFromCode() {
      const code = codeEditor.value.trim();
      if (!code) return;
      try {
        const parser = new DOMParser();
        const doc = parser.parseFromString(code, 'image/svg+xml');
        const parsedSvg = doc.documentElement;
        if (parsedSvg.tagName !== 'svg' && parsedSvg.querySelector('svg') === null) {
          showToast('Invalid SVG code');
          return;
        }
        const svgEl = parsedSvg.tagName === 'svg' ? parsedSvg : parsedSvg.querySelector('svg');
        // Update dimensions
        if (svgEl.getAttribute('width')) {
          svgW = parseInt(svgEl.getAttribute('width')) || svgW;
          canvasWInput.value = svgW;
        }
        if (svgEl.getAttribute('height')) {
          svgH = parseInt(svgEl.getAttribute('height')) || svgH;
          canvasHInput.value = svgH;
        }
        mainSvg.setAttribute('width', svgW);
        mainSvg.setAttribute('height', svgH);
        mainSvg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);
        mainSvg.innerHTML = svgEl.innerHTML;
        renderGrid();
        saveState();
        refreshLayers();
        showToast('SVG applied');
      } catch (e) {
        showToast('Parse error: ' + e.message);
      }
    }

    // --- Drawing ---
    function getSvgPoint(e) {
      const rect = mainSvg.getBoundingClientRect();
      const scaleX = svgW / rect.width;
      const scaleY = svgH / rect.height;
      let x = (e.clientX - rect.left) * scaleX;
      let y = (e.clientY - rect.top) * scaleY;
      x = snapVal(Math.round(x * 10) / 10);
      y = snapVal(Math.round(y * 10) / 10);
      return { x, y };
    }

    function getDrawAttrs() {
      return {
        fill: propFill.value,
        stroke: propStroke.value,
        'stroke-width': propStrokeW.value,
        opacity: propOpacity.value
      };
    }

    function applyAttrs(el, attrs) {
      for (const [k, v] of Object.entries(attrs)) {
        el.setAttribute(k, v);
      }
    }

    function attachSvgEvents() {
      mainSvg.addEventListener('mousedown', onMouseDown);
      mainSvg.addEventListener('mousemove', onMouseMove);
      mainSvg.addEventListener('mouseup', onMouseUp);
      mainSvg.addEventListener('dblclick', onDblClick);
    }

    function onMouseDown(e) {
      if (e.button !== 0) return;
      const pt = getSvgPoint(e);
      startX = pt.x;
      startY = pt.y;

      if (currentTool === 'select') {
        const target = e.target;
        if (target === mainSvg) {
          deselectAll();
        } else {
          selectElement(target);
        }
        return;
      }

      if (currentTool === 'polygon') {
        handlePolygonClick(pt);
        return;
      }

      if (currentTool === 'text') {
        const text = prompt('Enter text:', 'Text');
        if (text) {
          const el = document.createElementNS(NS, 'text');
          el.setAttribute('x', pt.x);
          el.setAttribute('y', pt.y);
          el.setAttribute('fill', propFill.value);
          el.setAttribute('stroke', propStroke.value);
          el.setAttribute('stroke-width', propStrokeW.value);
          el.setAttribute('opacity', propOpacity.value);
          el.setAttribute('font-size', '24');
          el.setAttribute('font-family', 'sans-serif');
          el.textContent = text;
          mainSvg.appendChild(el);
          saveState();
          syncCodeFromCanvas();
          refreshLayers();
          selectElement(el);
        }
        return;
      }

      drawing = true;
      const attrs = getDrawAttrs();

      if (currentTool === 'rect') {
        tempEl = document.createElementNS(NS, 'rect');
        applyAttrs(tempEl, { ...attrs, x: startX, y: startY, width: 0, height: 0 });
        mainSvg.appendChild(tempEl);
      } else if (currentTool === 'circle') {
        tempEl = document.createElementNS(NS, 'circle');
        applyAttrs(tempEl, { ...attrs, cx: startX, cy: startY, r: 0 });
        mainSvg.appendChild(tempEl);
      } else if (currentTool === 'ellipse') {
        tempEl = document.createElementNS(NS, 'ellipse');
        applyAttrs(tempEl, { ...attrs, cx: startX, cy: startY, rx: 0, ry: 0 });
        mainSvg.appendChild(tempEl);
      } else if (currentTool === 'line') {
        tempEl = document.createElementNS(NS, 'line');
        applyAttrs(tempEl, { ...attrs, x1: startX, y1: startY, x2: startX, y2: startY, fill: 'none' });
        mainSvg.appendChild(tempEl);
      } else if (currentTool === 'path') {
        pathPoints = [{ x: startX, y: startY }];
        tempEl = document.createElementNS(NS, 'path');
        applyAttrs(tempEl, { ...attrs, fill: 'none', d: `M${startX},${startY}` });
        mainSvg.appendChild(tempEl);
      }
    }

    function onMouseMove(e) {
      if (!drawing || !tempEl) return;
      const pt = getSvgPoint(e);

      if (currentTool === 'rect') {
        const x = Math.min(startX, pt.x);
        const y = Math.min(startY, pt.y);
        const w = Math.abs(pt.x - startX);
        const h = Math.abs(pt.y - startY);
        tempEl.setAttribute('x', x);
        tempEl.setAttribute('y', y);
        tempEl.setAttribute('width', w);
        tempEl.setAttribute('height', h);
      } else if (currentTool === 'circle') {
        const r = Math.sqrt((pt.x - startX) ** 2 + (pt.y - startY) ** 2);
        tempEl.setAttribute('r', Math.round(r * 10) / 10);
      } else if (currentTool === 'ellipse') {
        tempEl.setAttribute('rx', Math.abs(pt.x - startX));
        tempEl.setAttribute('ry', Math.abs(pt.y - startY));
      } else if (currentTool === 'line') {
        tempEl.setAttribute('x2', pt.x);
        tempEl.setAttribute('y2', pt.y);
      } else if (currentTool === 'path') {
        pathPoints.push(pt);
        let d = `M${pathPoints[0].x},${pathPoints[0].y}`;
        for (let i = 1; i < pathPoints.length; i++) {
          d += ` L${pathPoints[i].x},${pathPoints[i].y}`;
        }
        tempEl.setAttribute('d', d);
      }
    }

    function onMouseUp(e) {
      if (!drawing) return;
      drawing = false;
      if (tempEl) {
        // Don't keep tiny accidental shapes
        if (currentTool === 'rect') {
          const w = parseFloat(tempEl.getAttribute('width'));
          const h = parseFloat(tempEl.getAttribute('height'));
          if (w < 2 && h < 2) { tempEl.remove(); tempEl = null; return; }
        }
        saveState();
        syncCodeFromCanvas();
        refreshLayers();
        selectElement(tempEl);
        tempEl = null;
      }
    }

    // Polygon: click to add points, double-click to finish
    function handlePolygonClick(pt) {
      polygonPoints.push(pt);
      if (polygonPoints.length === 1) {
        polygonTempEl = document.createElementNS(NS, 'polygon');
        const attrs = getDrawAttrs();
        applyAttrs(polygonTempEl, attrs);
        polygonTempEl.setAttribute('points', `${pt.x},${pt.y}`);
        mainSvg.appendChild(polygonTempEl);
      } else {
        const pts = polygonPoints.map(p => `${p.x},${p.y}`).join(' ');
        polygonTempEl.setAttribute('points', pts);
      }
    }

    function onDblClick(e) {
      if (currentTool === 'polygon' && polygonTempEl && polygonPoints.length >= 3) {
        saveState();
        syncCodeFromCanvas();
        refreshLayers();
        selectElement(polygonTempEl);
        polygonPoints = [];
        polygonTempEl = null;
      }
    }

    // --- Selection ---
    function selectElement(el) {
      deselectAll();
      if (!el || el === mainSvg) return;
      selectedEl = el;
      el.classList.add('selected');
      loadPropsFromElement(el);
      refreshLayers();
    }

    function deselectAll() {
      if (selectedEl) {
        selectedEl.classList.remove('selected');
      }
      selectedEl = null;
      refreshLayers();
    }

    function loadPropsFromElement(el) {
      const fill = el.getAttribute('fill') || '#4facfe';
      const stroke = el.getAttribute('stroke') || '#ffffff';
      const sw = el.getAttribute('stroke-width') || '2';
      const op = el.getAttribute('opacity') || '1';

      propFill.value = normalizeColor(fill);
      propFillHex.value = normalizeColor(fill);
      propStroke.value = normalizeColor(stroke);
      propStrokeHex.value = normalizeColor(stroke);
      propStrokeW.value = parseFloat(sw);
      propOpacity.value = parseFloat(op);

      // Parse rotation from transform
      const transform = el.getAttribute('transform') || '';
      const rotMatch = transform.match(/rotate\(\s*([-\d.]+)/);
      propRotate.value = rotMatch ? parseFloat(rotMatch[1]) : 0;
    }

    function normalizeColor(c) {
      if (!c || c === 'none') return '#000000';
      if (c.startsWith('#') && c.length === 7) return c;
      if (c.startsWith('#') && c.length === 4) {
        return '#' + c[1]+c[1] + c[2]+c[2] + c[3]+c[3];
      }
      // Use a temp element to convert named colors
      const tmp = document.createElement('div');
      tmp.style.color = c;
      document.body.appendChild(tmp);
      const computed = getComputedStyle(tmp).color;
      document.body.removeChild(tmp);
      const m = computed.match(/(\d+)/g);
      if (m && m.length >= 3) {
        const hex = '#' + m.slice(0,3).map(n => parseInt(n).toString(16).padStart(2,'0')).join('');
        return hex;
      }
      return '#000000';
    }

    // --- Apply property changes to selected ---
    function applyPropToSelected(attr, value) {
      if (!selectedEl) return;
      if (attr === 'transform-rotate') {
        const bbox = selectedEl.getBBox ? selectedEl.getBBox() : { x: 0, y: 0, width: 0, height: 0 };
        const cx = bbox.x + bbox.width / 2;
        const cy = bbox.y + bbox.height / 2;
        if (parseFloat(value) === 0) {
          selectedEl.removeAttribute('transform');
        } else {
          selectedEl.setAttribute('transform', `rotate(${value}, ${cx}, ${cy})`);
        }
      } else {
        selectedEl.setAttribute(attr, value);
      }
      saveState();
      syncCodeFromCanvas();
    }

    // Property event listeners
    propFill.addEventListener('input', (e) => {
      propFillHex.value = e.target.value;
      applyPropToSelected('fill', e.target.value);
    });
    propFillHex.addEventListener('change', (e) => {
      const v = e.target.value;
      if (/^#[0-9a-fA-F]{6}$/.test(v)) {
        propFill.value = v;
        applyPropToSelected('fill', v);
      }
    });
    propStroke.addEventListener('input', (e) => {
      propStrokeHex.value = e.target.value;
      applyPropToSelected('stroke', e.target.value);
    });
    propStrokeHex.addEventListener('change', (e) => {
      const v = e.target.value;
      if (/^#[0-9a-fA-F]{6}$/.test(v)) {
        propStroke.value = v;
        applyPropToSelected('stroke', v);
      }
    });
    propStrokeW.addEventListener('change', (e) => {
      applyPropToSelected('stroke-width', e.target.value);
    });
    propOpacity.addEventListener('change', (e) => {
      applyPropToSelected('opacity', e.target.value);
    });
    propRotate.addEventListener('change', (e) => {
      applyPropToSelected('transform-rotate', e.target.value);
    });

    // --- Layers ---
    function refreshLayers() {
      const children = Array.from(mainSvg.children);
      if (children.length === 0) {
        layersList.innerHTML = '<div style="padding:10px 12px;color:var(--text-muted);font-size:0.72rem;">No elements</div>';
        return;
      }
      layersList.innerHTML = '';
      // Show in reverse order (top layers first)
      for (let i = children.length - 1; i >= 0; i--) {
        const el = children[i];
        const item = document.createElement('div');
        item.className = 'layer-item' + (el === selectedEl ? ' active' : '');
        const tag = el.tagName.toLowerCase();
        const id = el.getAttribute('id') || '';
        const label = id ? `${tag}#${id}` : tag;
        const isHidden = el.getAttribute('visibility') === 'hidden';

        item.innerHTML = `
          <span class="layer-name" title="${label}">${label}</span>
          <div class="layer-actions">
            <button class="layer-btn" data-action="up" title="Move up">&uarr;</button>
            <button class="layer-btn" data-action="down" title="Move down">&darr;</button>
            <button class="layer-btn" data-action="toggle" title="Show/Hide">${isHidden ? '&#9675;' : '&#9679;'}</button>
            <button class="layer-btn danger" data-action="delete" title="Delete">&times;</button>
          </div>
        `;

        // Click to select
        item.querySelector('.layer-name').addEventListener('click', () => {
          selectElement(el);
        });

        // Action buttons
        item.querySelectorAll('.layer-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const action = btn.dataset.action;
            if (action === 'up') {
              const next = el.nextElementSibling;
              if (next) {
                mainSvg.insertBefore(next, el);
                saveState();
                syncCodeFromCanvas();
                refreshLayers();
              }
            } else if (action === 'down') {
              const prev = el.previousElementSibling;
              if (prev) {
                mainSvg.insertBefore(el, prev);
                saveState();
                syncCodeFromCanvas();
                refreshLayers();
              }
            } else if (action === 'toggle') {
              if (el.getAttribute('visibility') === 'hidden') {
                el.removeAttribute('visibility');
              } else {
                el.setAttribute('visibility', 'hidden');
              }
              saveState();
              syncCodeFromCanvas();
              refreshLayers();
            } else if (action === 'delete') {
              if (el === selectedEl) deselectAll();
              el.remove();
              saveState();
              syncCodeFromCanvas();
              refreshLayers();
            }
          });
        });

        layersList.appendChild(item);
      }
    }

    // --- Tool selection ---
    document.querySelectorAll('.tool-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTool = btn.dataset.tool;
        mainSvg.style.cursor = currentTool === 'select' ? 'default' : 'crosshair';
      });
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      // Don't intercept when typing in inputs
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
        // But allow Ctrl+Z/Y in textarea
        if (e.target === codeEditor) return;
        if (e.ctrlKey || e.metaKey) {
          if (e.key === 'z') { e.preventDefault(); undo(); return; }
          if (e.key === 'y') { e.preventDefault(); redo(); return; }
        }
        return;
      }

      if (e.ctrlKey || e.metaKey) {
        if (e.key === 'z') { e.preventDefault(); undo(); return; }
        if (e.key === 'y') { e.preventDefault(); redo(); return; }
      }

      const shortcuts = { v: 'select', r: 'rect', c: 'circle', e: 'ellipse', l: 'line', p: 'polygon', f: 'path', t: 'text' };
      if (shortcuts[e.key]) {
        document.querySelector(`.tool-btn[data-tool="${shortcuts[e.key]}"]`).click();
      }

      if (e.key === 'Delete' || e.key === 'Backspace') {
        if (selectedEl) {
          selectedEl.remove();
          deselectAll();
          saveState();
          syncCodeFromCanvas();
          refreshLayers();
        }
      }
    });

    // --- Canvas size ---
    canvasWInput.addEventListener('change', () => {
      svgW = parseInt(canvasWInput.value) || 800;
      mainSvg.setAttribute('width', svgW);
      mainSvg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);
      renderGrid();
      syncCodeFromCanvas();
    });
    canvasHInput.addEventListener('change', () => {
      svgH = parseInt(canvasHInput.value) || 600;
      mainSvg.setAttribute('height', svgH);
      mainSvg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);
      renderGrid();
      syncCodeFromCanvas();
    });

    // --- Grid / Snap ---
    const btnGrid = document.getElementById('btn-grid');
    const btnSnap = document.getElementById('btn-snap');

    btnGrid.addEventListener('click', () => {
      showGrid = !showGrid;
      btnGrid.classList.toggle('btn-accent', showGrid);
      renderGrid();
    });

    btnSnap.addEventListener('click', () => {
      snapGrid = !snapGrid;
      btnSnap.classList.toggle('btn-accent', snapGrid);
    });

    // --- Undo/Redo buttons ---
    document.getElementById('btn-undo').addEventListener('click', undo);
    document.getElementById('btn-redo').addEventListener('click', redo);

    // --- Code editor apply ---
    document.getElementById('btn-apply-code').addEventListener('click', syncCanvasFromCode);

    // --- Import SVG ---
    const importModal = document.getElementById('import-modal');
    const importCode = document.getElementById('import-code');

    document.getElementById('btn-import-svg').addEventListener('click', () => {
      importCode.value = '';
      importModal.classList.remove('hidden');
    });

    document.getElementById('btn-import-cancel').addEventListener('click', () => {
      importModal.classList.add('hidden');
    });

    importModal.addEventListener('click', (e) => {
      if (e.target === importModal) importModal.classList.add('hidden');
    });

    document.getElementById('btn-import-apply').addEventListener('click', () => {
      const code = importCode.value.trim();
      if (!code) return;
      codeEditor.value = code;
      syncCanvasFromCode();
      importModal.classList.add('hidden');
    });

    // --- Upload SVG file ---
    const fileInput = document.getElementById('file-input');
    document.getElementById('btn-upload-svg').addEventListener('click', () => {
      fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        codeEditor.value = ev.target.result;
        syncCanvasFromCode();
      };
      reader.readAsText(file);
      fileInput.value = '';
    });

    // --- Export ---
    document.getElementById('btn-dl-svg').addEventListener('click', () => {
      const svgCode = getSvgExportCode();
      const blob = new Blob([svgCode], { type: 'image/svg+xml' });
      downloadBlob(blob, 'drawing.svg');
    });

    document.getElementById('btn-copy-svg').addEventListener('click', () => {
      const svgCode = getSvgExportCode();
      navigator.clipboard.writeText(svgCode).then(() => {
        showToast('SVG code copied');
      }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = svgCode;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('SVG code copied');
      });
    });

    document.getElementById('btn-dl-png').addEventListener('click', () => {
      const svgCode = getSvgExportCode();
      const blob = new Blob([svgCode], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = svgW;
        canvas.height = svgH;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        URL.revokeObjectURL(url);
        canvas.toBlob((pngBlob) => {
          downloadBlob(pngBlob, 'drawing.png');
        }, 'image/png');
      };
      img.onerror = () => {
        URL.revokeObjectURL(url);
        showToast('PNG export failed');
      };
      img.src = url;
    });

    function getSvgExportCode() {
      // Clone and remove selection class
      const clone = mainSvg.cloneNode(true);
      clone.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
      // Remove empty class attributes
      clone.querySelectorAll('[class=""]').forEach(el => el.removeAttribute('class'));
      const serializer = new XMLSerializer();
      let code = serializer.serializeToString(clone);
      // Add XML declaration
      code = '<?xml version="1.0" encoding="UTF-8"?>\n' + code;
      return code;
    }

    function downloadBlob(blob, filename) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 100);
    }

    // --- Toast ---
    function showToast(msg) {
      let toast = document.querySelector('.toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.className = 'toast';
        document.body.appendChild(toast);
      }
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // --- Init ---
    initSvg();
    saveState();
    syncCodeFromCanvas();
    refreshLayers();

  })();
  </script>
</body>
</html>
