<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer - Free Online Tool | imseankim.com</title>
  <meta name="description" content="Stay focused and productive with this free Pomodoro Timer. Customizable focus and break durations, session tracking, browser notifications, and daily stats.">
  <meta property="og:title" content="Pomodoro Timer - Free Online Tool | imseankim.com">
  <meta property="og:description" content="Free online Pomodoro Timer with customizable durations, session tracking, and browser notifications.">
  <meta property="og:url" content="https://imseankim.com/tools/pomodoro">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://imseankim.com/tools/pomodoro">
  <link rel="stylesheet" href="/shared/style.css">
  <style>
    .tool-content {
      max-width: 620px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .tool-title {
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 8px;
    }

    .tool-subtitle {
      text-align: center;
      color: var(--text-muted, #888);
      font-size: 0.85rem;
      letter-spacing: 1px;
      margin-bottom: 36px;
    }

    /* Mode Tabs */
    .mode-tabs {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 32px;
    }

    .mode-tab {
      background: #141414;
      border: 1px solid #222;
      color: #888;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }

    .mode-tab:hover {
      border-color: #333;
      color: #ccc;
    }

    .mode-tab.active-focus {
      background: rgba(79, 172, 254, 0.1);
      border-color: #4facfe;
      color: #4facfe;
    }

    .mode-tab.active-break {
      background: rgba(67, 233, 123, 0.1);
      border-color: #43e97b;
      color: #43e97b;
    }

    /* Timer Display */
    .timer-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 28px;
      position: relative;
    }

    .timer-svg {
      width: 280px;
      height: 280px;
      transform: rotate(-90deg);
    }

    .timer-track {
      fill: none;
      stroke: #222;
      stroke-width: 6;
    }

    .timer-progress {
      fill: none;
      stroke: #4facfe;
      stroke-width: 6;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.5s linear, stroke 0.3s;
    }

    .timer-progress.break-mode {
      stroke: #43e97b;
    }

    .timer-text {
      position: absolute;
      text-align: center;
    }

    .timer-time {
      font-size: 3.2rem;
      font-weight: 200;
      letter-spacing: 4px;
      color: #eee;
      font-variant-numeric: tabular-nums;
    }

    .timer-label {
      font-size: 0.75rem;
      color: #666;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 32px;
    }

    .btn {
      padding: 12px 28px;
      border-radius: 8px;
      border: 1px solid #222;
      background: #141414;
      color: #ccc;
      cursor: pointer;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }

    .btn:hover {
      border-color: #444;
      color: #fff;
    }

    .btn-primary {
      background: #4facfe;
      border-color: #4facfe;
      color: #0a0a0a;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: #6fbfff;
      border-color: #6fbfff;
    }

    .btn-primary.break-mode {
      background: #43e97b;
      border-color: #43e97b;
    }

    .btn-primary.break-mode:hover {
      background: #5eee92;
      border-color: #5eee92;
    }

    /* Task Input */
    .task-section {
      margin-bottom: 24px;
    }

    .task-input {
      width: 100%;
      background: #141414;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 12px 16px;
      color: #ccc;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }

    .task-input::placeholder {
      color: #555;
    }

    .task-input:focus {
      border-color: #4facfe;
    }

    /* Stats Card */
    .stats-card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }

    .stats-title {
      font-size: 0.75rem;
      color: #666;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 300;
      color: #eee;
      margin-bottom: 4px;
    }

    .stat-value.accent-focus {
      color: #4facfe;
    }

    .stat-value.accent-break {
      color: #43e97b;
    }

    .stat-label {
      font-size: 0.7rem;
      color: #666;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Session Dots */
    .session-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
    }

    .session-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #222;
      transition: background 0.3s;
    }

    .session-dot.completed {
      background: #4facfe;
    }

    .session-dot.active {
      background: #4facfe;
      box-shadow: 0 0 8px rgba(79, 172, 254, 0.4);
    }

    /* Settings */
    .settings-card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 20px 24px;
    }

    .settings-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      margin-bottom: 0;
    }

    .settings-toggle-label {
      font-size: 0.75rem;
      color: #888;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .settings-toggle-icon {
      color: #555;
      font-size: 0.8rem;
      transition: transform 0.2s;
    }

    .settings-toggle-icon.open {
      transform: rotate(180deg);
    }

    .settings-body {
      display: none;
      padding-top: 16px;
    }

    .settings-body.open {
      display: block;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .setting-row:last-child {
      margin-bottom: 0;
    }

    .setting-label {
      font-size: 0.8rem;
      color: #888;
      letter-spacing: 0.5px;
    }

    .setting-value {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .setting-input {
      width: 60px;
      background: #0a0a0a;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 6px 10px;
      color: #ccc;
      font-size: 0.85rem;
      text-align: center;
      outline: none;
    }

    .setting-input:focus {
      border-color: #4facfe;
    }

    .setting-unit {
      font-size: 0.75rem;
      color: #555;
    }

    /* Notification banner */
    .notif-banner {
      background: rgba(79, 172, 254, 0.08);
      border: 1px solid rgba(79, 172, 254, 0.2);
      border-radius: 8px;
      padding: 10px 16px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #888;
    }

    .notif-banner.hidden {
      display: none;
    }

    .notif-btn {
      background: none;
      border: 1px solid #4facfe;
      color: #4facfe;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.2s;
    }

    .notif-btn:hover {
      background: rgba(79, 172, 254, 0.1);
    }
  </style>
</head>
<body>
  <script src="/shared/header.js"></script>

  <main class="tool-content">
    <h1 class="tool-title">Pomodoro Timer</h1>
    <p class="tool-subtitle">Stay focused, take breaks, get things done</p>

    <!-- Notification Permission Banner -->
    <div class="notif-banner hidden" id="notifBanner">
      <span>Enable browser notifications to get alerted when a session ends</span>
      <button class="notif-btn" id="notifEnableBtn">Enable</button>
    </div>

    <!-- Mode Tabs -->
    <div class="mode-tabs">
      <button class="mode-tab active-focus" data-mode="focus" id="tabFocus">Focus</button>
      <button class="mode-tab" data-mode="short" id="tabShort">Short Break</button>
      <button class="mode-tab" data-mode="long" id="tabLong">Long Break</button>
    </div>

    <!-- Session Dots (4 focus sessions before long break) -->
    <div class="session-dots" id="sessionDots">
      <div class="session-dot active"></div>
      <div class="session-dot"></div>
      <div class="session-dot"></div>
      <div class="session-dot"></div>
    </div>

    <!-- Timer -->
    <div class="timer-container">
      <svg class="timer-svg" viewBox="0 0 280 280">
        <circle class="timer-track" cx="140" cy="140" r="124"></circle>
        <circle class="timer-progress" id="progressRing" cx="140" cy="140" r="124"
          stroke-dasharray="779.42" stroke-dashoffset="0"></circle>
      </svg>
      <div class="timer-text">
        <div class="timer-time" id="timerDisplay">25:00</div>
        <div class="timer-label" id="timerLabel">Focus</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn btn-primary" id="btnStart">Start</button>
      <button class="btn" id="btnPause" style="display:none;">Pause</button>
      <button class="btn" id="btnReset">Reset</button>
    </div>

    <!-- Task Input -->
    <div class="task-section">
      <input type="text" class="task-input" id="taskInput" placeholder="What are you working on?" maxlength="100">
    </div>

    <!-- Today's Stats -->
    <div class="stats-card">
      <div class="stats-title">Today's Stats</div>
      <div class="stats-grid">
        <div>
          <div class="stat-value accent-focus" id="statSessions">0</div>
          <div class="stat-label">Sessions</div>
        </div>
        <div>
          <div class="stat-value" id="statFocusTime">0m</div>
          <div class="stat-label">Focus Time</div>
        </div>
        <div>
          <div class="stat-value accent-break" id="statBreakTime">0m</div>
          <div class="stat-label">Break Time</div>
        </div>
      </div>
    </div>

    <!-- Settings -->
    <div class="settings-card">
      <div class="settings-toggle" id="settingsToggle">
        <span class="settings-toggle-label">Settings</span>
        <span class="settings-toggle-icon" id="settingsIcon">&#9660;</span>
      </div>
      <div class="settings-body" id="settingsBody">
        <div class="setting-row">
          <span class="setting-label">Focus Duration</span>
          <div class="setting-value">
            <input type="number" class="setting-input" id="setFocus" value="25" min="1" max="120">
            <span class="setting-unit">min</span>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-label">Short Break</span>
          <div class="setting-value">
            <input type="number" class="setting-input" id="setShort" value="5" min="1" max="60">
            <span class="setting-unit">min</span>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-label">Long Break</span>
          <div class="setting-value">
            <input type="number" class="setting-input" id="setLong" value="15" min="1" max="60">
            <span class="setting-unit">min</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="/shared/footer.js"></script>
  <script>
    (function() {
      // --- State ---
      var durations = { focus: 25, short: 5, long: 15 };
      var currentMode = 'focus'; // 'focus', 'short', 'long'
      var timeLeft = durations.focus * 60; // seconds
      var totalTime = timeLeft;
      var running = false;
      var intervalId = null;
      var focusSessionsCompleted = 0; // total today
      var cyclePosition = 0; // 0-3: which focus in the 4-cycle we are on
      var todayFocusSec = 0;
      var todayBreakSec = 0;
      var todayDate = new Date().toDateString();

      // --- Elements ---
      var display = document.getElementById('timerDisplay');
      var label = document.getElementById('timerLabel');
      var ring = document.getElementById('progressRing');
      var btnStart = document.getElementById('btnStart');
      var btnPause = document.getElementById('btnPause');
      var btnReset = document.getElementById('btnReset');
      var tabFocus = document.getElementById('tabFocus');
      var tabShort = document.getElementById('tabShort');
      var tabLong = document.getElementById('tabLong');
      var sessionDots = document.getElementById('sessionDots');
      var taskInput = document.getElementById('taskInput');
      var statSessions = document.getElementById('statSessions');
      var statFocusTime = document.getElementById('statFocusTime');
      var statBreakTime = document.getElementById('statBreakTime');
      var setFocus = document.getElementById('setFocus');
      var setShort = document.getElementById('setShort');
      var setLong = document.getElementById('setLong');
      var settingsToggle = document.getElementById('settingsToggle');
      var settingsBody = document.getElementById('settingsBody');
      var settingsIcon = document.getElementById('settingsIcon');
      var notifBanner = document.getElementById('notifBanner');
      var notifEnableBtn = document.getElementById('notifEnableBtn');

      var circumference = 2 * Math.PI * 124; // ~779.42

      // --- Load saved stats ---
      function loadStats() {
        try {
          var saved = JSON.parse(localStorage.getItem('pomodoro_stats') || '{}');
          if (saved.date === todayDate) {
            focusSessionsCompleted = saved.sessions || 0;
            todayFocusSec = saved.focusSec || 0;
            todayBreakSec = saved.breakSec || 0;
            cyclePosition = saved.cyclePos || 0;
          }
        } catch(e) {}
        updateStats();
        updateDots();
      }

      function saveStats() {
        localStorage.setItem('pomodoro_stats', JSON.stringify({
          date: todayDate,
          sessions: focusSessionsCompleted,
          focusSec: todayFocusSec,
          breakSec: todayBreakSec,
          cyclePos: cyclePosition
        }));
      }

      // --- Notification ---
      function checkNotifPermission() {
        if ('Notification' in window && Notification.permission === 'default') {
          notifBanner.classList.remove('hidden');
        }
      }

      notifEnableBtn.addEventListener('click', function() {
        Notification.requestPermission().then(function(perm) {
          notifBanner.classList.add('hidden');
        });
      });

      function sendNotification(title, body) {
        if ('Notification' in window && Notification.permission === 'granted') {
          new Notification(title, { body: body, icon: '' });
        }
      }

      // --- Audio (Web Audio API beep) ---
      var audioCtx = null;

      function playBeep() {
        try {
          if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          var now = audioCtx.currentTime;
          for (var i = 0; i < 3; i++) {
            var osc = audioCtx.createOscillator();
            var gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.value = 880;
            gain.gain.setValueAtTime(0.3, now + i * 0.25);
            gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.25 + 0.2);
            osc.start(now + i * 0.25);
            osc.stop(now + i * 0.25 + 0.2);
          }
        } catch(e) {}
      }

      // --- Format ---
      function formatTime(sec) {
        var m = Math.floor(sec / 60);
        var s = sec % 60;
        return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
      }

      function formatMinutes(sec) {
        var m = Math.floor(sec / 60);
        if (m < 60) return m + 'm';
        var h = Math.floor(m / 60);
        var rm = m % 60;
        return h + 'h ' + rm + 'm';
      }

      // --- Rendering ---
      function isBreakMode() {
        return currentMode === 'short' || currentMode === 'long';
      }

      function updateDisplay() {
        display.textContent = formatTime(timeLeft);
        var offset = circumference * (1 - timeLeft / totalTime);
        ring.style.strokeDashoffset = offset;

        if (isBreakMode()) {
          ring.classList.add('break-mode');
        } else {
          ring.classList.remove('break-mode');
        }
      }

      function updateTabs() {
        tabFocus.className = 'mode-tab' + (currentMode === 'focus' ? ' active-focus' : '');
        tabShort.className = 'mode-tab' + (currentMode === 'short' ? ' active-break' : '');
        tabLong.className = 'mode-tab' + (currentMode === 'long' ? ' active-break' : '');

        var labels = { focus: 'Focus', short: 'Short Break', long: 'Long Break' };
        label.textContent = labels[currentMode];

        if (isBreakMode()) {
          btnStart.classList.add('break-mode');
        } else {
          btnStart.classList.remove('break-mode');
        }
      }

      function updateDots() {
        var dots = sessionDots.children;
        for (var i = 0; i < 4; i++) {
          dots[i].className = 'session-dot';
          if (i < (cyclePosition % 4)) {
            dots[i].classList.add('completed');
          } else if (i === (cyclePosition % 4) && currentMode === 'focus') {
            dots[i].classList.add('active');
          }
        }
      }

      function updateStats() {
        statSessions.textContent = focusSessionsCompleted;
        statFocusTime.textContent = formatMinutes(todayFocusSec);
        statBreakTime.textContent = formatMinutes(todayBreakSec);
      }

      function updateTitle() {
        var prefix = formatTime(timeLeft);
        var modeStr = currentMode === 'focus' ? 'Focus' : 'Break';
        document.title = prefix + ' - ' + modeStr + ' | Pomodoro Timer';
      }

      // --- Mode switching ---
      function switchMode(mode, userInitiated) {
        if (running) stopTimer();
        currentMode = mode;
        totalTime = durations[mode] * 60;
        timeLeft = totalTime;
        updateTabs();
        updateDots();
        updateDisplay();
        updateTitle();
        btnStart.style.display = '';
        btnPause.style.display = 'none';
        btnStart.textContent = 'Start';
      }

      // Auto-advance after timer ends
      function autoAdvance() {
        if (currentMode === 'focus') {
          focusSessionsCompleted++;
          todayFocusSec += durations.focus * 60;
          cyclePosition++;
          saveStats();
          updateStats();

          var task = taskInput.value.trim();
          var notifBody = task ? 'Task: ' + task : 'Great work!';

          if (cyclePosition % 4 === 0) {
            playBeep();
            sendNotification('Time for a long break!', notifBody + ' You completed 4 sessions.');
            switchMode('long');
          } else {
            playBeep();
            sendNotification('Time for a short break!', notifBody);
            switchMode('short');
          }
        } else {
          todayBreakSec += durations[currentMode] * 60;
          saveStats();
          updateStats();
          playBeep();
          sendNotification('Break over!', 'Time to focus.');
          switchMode('focus');
        }
      }

      // --- Timer ---
      function startTimer() {
        if (timeLeft <= 0) return;
        // Resume AudioContext on user gesture
        if (audioCtx && audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        running = true;
        btnStart.style.display = 'none';
        btnPause.style.display = '';

        intervalId = setInterval(function() {
          timeLeft--;
          updateDisplay();
          updateTitle();
          if (timeLeft <= 0) {
            stopTimer();
            autoAdvance();
          }
        }, 1000);
      }

      function stopTimer() {
        running = false;
        clearInterval(intervalId);
        intervalId = null;
        btnStart.style.display = '';
        btnPause.style.display = 'none';
        btnStart.textContent = timeLeft < totalTime ? 'Resume' : 'Start';
      }

      // --- Event Listeners ---
      btnStart.addEventListener('click', startTimer);
      btnPause.addEventListener('click', stopTimer);
      btnReset.addEventListener('click', function() {
        switchMode(currentMode);
      });

      tabFocus.addEventListener('click', function() { switchMode('focus'); });
      tabShort.addEventListener('click', function() { switchMode('short'); });
      tabLong.addEventListener('click', function() { switchMode('long'); });

      // Settings toggle
      settingsToggle.addEventListener('click', function() {
        var isOpen = settingsBody.classList.toggle('open');
        settingsIcon.classList.toggle('open', isOpen);
      });

      // Settings inputs
      function onSettingChange() {
        var f = parseInt(setFocus.value, 10) || 25;
        var s = parseInt(setShort.value, 10) || 5;
        var l = parseInt(setLong.value, 10) || 15;
        f = Math.max(1, Math.min(120, f));
        s = Math.max(1, Math.min(60, s));
        l = Math.max(1, Math.min(60, l));
        durations.focus = f;
        durations.short = s;
        durations.long = l;

        // If not running, update the current timer
        if (!running) {
          totalTime = durations[currentMode] * 60;
          timeLeft = totalTime;
          updateDisplay();
          updateTitle();
        }
      }

      setFocus.addEventListener('change', onSettingChange);
      setShort.addEventListener('change', onSettingChange);
      setLong.addEventListener('change', onSettingChange);

      // --- Init ---
      loadStats();
      checkNotifPermission();
      updateDisplay();
      updateTabs();
      updateTitle();
    })();
  </script>
</body>
</html>
