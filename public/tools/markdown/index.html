        .stats-bar {

        @media (max-width: 768px) {

<body>
    <script src="/shared/header.js"></script>

    <main class="tool-content">
        <div class="md-container">
            <div class="md-header">
                <h1>Markdown Preview</h1>
                <p>Write Markdown on the left, see the live preview on the right</p>
            </div>

            <div class="toolbar">
                <div class="toolbar-group">
                    <button onclick="insertMd('bold')" title="Bold (Ctrl+B)"><b>B</b></button>
                    <button onclick="insertMd('italic')" title="Italic (Ctrl+I)"><i>I</i></button>
                    <button onclick="insertMd('strikethrough')" title="Strikethrough"><s>S</s></button>
                </div>
                <div class="toolbar-divider"></div>
                <div class="toolbar-group">
                    <button onclick="insertMd('heading')" title="Heading">H</button>
                    <button onclick="insertMd('link')" title="Link">Link</button>
                    <button onclick="insertMd('image')" title="Image">Image</button>
                </div>
                <div class="toolbar-divider"></div>
                <div class="toolbar-group">
                    <button onclick="insertMd('code')" title="Inline Code">Code</button>
                    <button onclick="insertMd('codeblock')" title="Code Block">Block</button>
                </div>
                <div class="toolbar-divider"></div>
                <div class="toolbar-group">
                    <button onclick="insertMd('ul')" title="Unordered List">List</button>
                    <button onclick="insertMd('ol')" title="Ordered List">1. List</button>
                    <button onclick="insertMd('task')" title="Task List">Task</button>
                    <button onclick="insertMd('quote')" title="Blockquote">Quote</button>
                    <button onclick="insertMd('table')" title="Table">Table</button>
                    <button onclick="insertMd('hr')" title="Horizontal Rule">HR</button>
                </div>
                <div class="toolbar-right">
                    <button onclick="exportHtml()">Export HTML</button>
                    <button onclick="copyHtml()">Copy HTML</button>
                </div>
            </div>

            <div class="editor-wrapper">
                <div class="editor-pane">
                    <div class="pane-label">Markdown</div>
                    <textarea id="md-editor" placeholder="Type your Markdown here..." spellcheck="false"></textarea>
                </div>
                <div class="preview-pane">
                    <div class="pane-label">Preview</div>
                    <div id="md-preview"></div>
                </div>
            </div>

            <div class="stats-bar">
                <span>Words: <span class="stat-value" id="word-count">0</span></span>
                <span>Characters: <span class="stat-value" id="char-count">0</span></span>
                <span>Reading time: <span class="stat-value" id="read-time">0 min</span></span>
            </div>
        </div>

        <div class="toast" id="toast"></div>
    </main>

    <script src="/shared/footer.js"></script>
    <script>
    (function() {
        const editor = document.getElementById('md-editor');
        const preview = document.getElementById('md-preview');
        const wordCountEl = document.getElementById('word-count');
        const charCountEl = document.getElementById('char-count');
        const readTimeEl = document.getElementById('read-time');

        // --- Markdown Parser ---

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function parseInline(text) {
            // Images: ![alt](url)
            text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
            // Links: [text](url)
            text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
            // Bold + Italic
            text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
            text = text.replace(/___(.+?)___/g, '<strong><em>$1</em></strong>');
            // Bold
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
            // Italic
            text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
            text = text.replace(/_(.+?)_/g, '<em>$1</em>');
            // Strikethrough
            text = text.replace(/~~(.+?)~~/g, '<del>$1</del>');
            // Inline code (must be after bold/italic to avoid conflicts)
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            // Line breaks
            text = text.replace(/  \n/g, '<br>');
            return text;
        }

        function parseMarkdown(src) {
            var lines = src.split('\n');
            var html = '';
            var i = 0;
            var len = lines.length;

            while (i < len) {
                var line = lines[i];

                // Blank line
                if (line.trim() === '') {
                    i++;
                    continue;
                }

                // Fenced code block
                if (/^```(.*)$/.test(line.trim())) {
                    var lang = line.trim().slice(3).trim();
                    var codeLines = [];
                    i++;
                    while (i < len && !/^```\s*$/.test(lines[i].trim())) {
                        codeLines.push(escapeHtml(lines[i]));
                        i++;
                    }
                    i++; // skip closing ```
                    var langAttr = lang ? ' data-lang="' + escapeHtml(lang) + '"' : '';
                    html += '<pre><code' + langAttr + '>' + codeLines.join('\n') + '</code></pre>\n';
                    continue;
                }

                // Table
                if (/^\|(.+)\|/.test(line.trim()) && i + 1 < len && /^\|[\s\-:|]+\|/.test(lines[i + 1].trim())) {
                    var headerCells = line.trim().replace(/^\|/, '').replace(/\|$/, '').split('|').map(function(c) { return c.trim(); });
                    var alignLine = lines[i + 1].trim().replace(/^\|/, '').replace(/\|$/, '').split('|');
                    var aligns = alignLine.map(function(c) {
                        c = c.trim();
                        if (c.startsWith(':') && c.endsWith(':')) return 'center';
                        if (c.endsWith(':')) return 'right';
                        return 'left';
                    });
                    html += '<table><thead><tr>';
                    for (var h = 0; h < headerCells.length; h++) {
                        html += '<th style="text-align:' + aligns[h] + '">' + parseInline(headerCells[h]) + '</th>';
                    }
                    html += '</tr></thead><tbody>';
                    i += 2;
                    while (i < len && /^\|(.+)\|/.test(lines[i].trim())) {
                        var rowCells = lines[i].trim().replace(/^\|/, '').replace(/\|$/, '').split('|').map(function(c) { return c.trim(); });
                        html += '<tr>';
                        for (var r = 0; r < headerCells.length; r++) {
                            var cellVal = r < rowCells.length ? rowCells[r] : '';
                            var align = r < aligns.length ? aligns[r] : 'left';
                            html += '<td style="text-align:' + align + '">' + parseInline(cellVal) + '</td>';
                        }
                        html += '</tr>';
                        i++;
                    }
                    html += '</tbody></table>\n';
                    continue;
                }

                // Heading
                var headingMatch = line.match(/^(#{1,6})\s+(.+)/);
                if (headingMatch) {
                    var level = headingMatch[1].length;
                    html += '<h' + level + '>' + parseInline(headingMatch[2]) + '</h' + level + '>\n';
                    i++;
                    continue;
                }

                // Horizontal rule
                if (/^(\*{3,}|-{3,}|_{3,})\s*$/.test(line.trim())) {
                    html += '<hr>\n';
                    i++;
                    continue;
                }

                // Blockquote
                if (/^>\s?/.test(line)) {
                    var quoteLines = [];
                    while (i < len && /^>\s?/.test(lines[i])) {
                        quoteLines.push(lines[i].replace(/^>\s?/, ''));
                        i++;
                    }
                    html += '<blockquote>' + parseMarkdown(quoteLines.join('\n')) + '</blockquote>\n';
                    continue;
                }

                // Unordered list (including task lists)
                if (/^[\*\-\+]\s/.test(line.trim())) {
                    html += '<ul>';
                    while (i < len && /^[\*\-\+]\s/.test(lines[i].trim())) {
                        var itemText = lines[i].trim().replace(/^[\*\-\+]\s/, '');
                        var taskMatch = itemText.match(/^\[([ xX])\]\s(.*)/);
                        if (taskMatch) {
                            var checked = taskMatch[1] !== ' ' ? ' checked disabled' : ' disabled';
                            html += '<li class="task-item"><input type="checkbox"' + checked + '>' + parseInline(taskMatch[2]) + '</li>';
                        } else {
                            html += '<li>' + parseInline(itemText) + '</li>';
                        }
                        i++;
                    }
                    html += '</ul>\n';
                    continue;
                }

                // Ordered list
                if (/^\d+\.\s/.test(line.trim())) {
                    html += '<ol>';
                    while (i < len && /^\d+\.\s/.test(lines[i].trim())) {
                        var olText = lines[i].trim().replace(/^\d+\.\s/, '');
                        html += '<li>' + parseInline(olText) + '</li>';
                        i++;
                    }
                    html += '</ol>\n';
                    continue;
                }

                // Paragraph (collect consecutive non-empty, non-special lines)
                var pLines = [];
                while (i < len && lines[i].trim() !== '' &&
                       !/^#{1,6}\s/.test(lines[i]) &&
                       !/^```/.test(lines[i].trim()) &&
                       !/^>\s?/.test(lines[i]) &&
                       !/^[\*\-\+]\s/.test(lines[i].trim()) &&
                       !/^\d+\.\s/.test(lines[i].trim()) &&
                       !/^(\*{3,}|-{3,}|_{3,})\s*$/.test(lines[i].trim()) &&
                       !/^\|(.+)\|/.test(lines[i].trim())) {
                    pLines.push(lines[i]);
                    i++;
                }
                html += '<p>' + parseInline(pLines.join('\n')) + '</p>\n';
            }

            return html;
        }

        // --- Render ---

        function render() {
            var src = editor.value;
            preview.innerHTML = parseMarkdown(src);
            updateStats(src);
        }

        function updateStats(text) {
            var trimmed = text.trim();
            var words = trimmed === '' ? 0 : trimmed.split(/\s+/).length;
            var chars = text.length;
            var minutes = Math.max(1, Math.ceil(words / 200));
            wordCountEl.textContent = words;
            charCountEl.textContent = chars;
            readTimeEl.textContent = words === 0 ? '0 min' : minutes + ' min';
        }

        editor.addEventListener('input', render);

        // --- Toolbar Insertions ---

        window.insertMd = function(type) {
            var start = editor.selectionStart;
            var end = editor.selectionEnd;
            var sel = editor.value.substring(start, end);
            var before = editor.value.substring(0, start);
            var after = editor.value.substring(end);
            var insert = '';
            var cursorOffset = 0;

            switch(type) {
                case 'bold':
                    insert = '**' + (sel || 'bold text') + '**';
                    cursorOffset = sel ? insert.length : 2;
                    break;
                case 'italic':
                    insert = '*' + (sel || 'italic text') + '*';
                    cursorOffset = sel ? insert.length : 1;
                    break;
                case 'strikethrough':
                    insert = '~~' + (sel || 'strikethrough') + '~~';
                    cursorOffset = sel ? insert.length : 2;
                    break;
                case 'heading':
                    insert = '## ' + (sel || 'Heading');
                    cursorOffset = 3;
                    break;
                case 'link':
                    insert = '[' + (sel || 'link text') + '](url)';
                    cursorOffset = sel ? insert.length - 5 : 1;
                    break;
                case 'image':
                    insert = '![' + (sel || 'alt text') + '](image-url)';
                    cursorOffset = sel ? insert.length - 11 : 2;
                    break;
                case 'code':
                    insert = '`' + (sel || 'code') + '`';
                    cursorOffset = sel ? insert.length : 1;
                    break;
                case 'codeblock':
                    insert = '```\n' + (sel || 'code here') + '\n```';
                    cursorOffset = 4;
                    break;
                case 'ul':
                    insert = '- ' + (sel || 'List item');
                    cursorOffset = 2;
                    break;
                case 'ol':
                    insert = '1. ' + (sel || 'List item');
                    cursorOffset = 3;
                    break;
                case 'task':
                    insert = '- [ ] ' + (sel || 'Task item');
                    cursorOffset = 6;
                    break;
                case 'quote':
                    insert = '> ' + (sel || 'Quote');
                    cursorOffset = 2;
                    break;
                case 'table':
                    insert = '| Header 1 | Header 2 | Header 3 |\n| -------- | -------- | -------- |\n| Cell 1   | Cell 2   | Cell 3   |';
                    cursorOffset = insert.length;
                    break;
                case 'hr':
                    insert = '\n---\n';
                    cursorOffset = insert.length;
                    break;
            }

            editor.value = before + insert + after;
            editor.focus();
            var newPos = start + cursorOffset;
            editor.setSelectionRange(newPos, newPos + (sel ? sel.length : (insert.length - cursorOffset)));
            render();
        };

        // --- Export / Copy ---

        function getFullHtml() {
            var body = preview.innerHTML;
            return '<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>Markdown Export</title>\n<style>\nbody { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; line-height: 1.7; color: #333; }\npre { background: #f4f4f4; padding: 14px; border-radius: 6px; overflow-x: auto; }\ncode { background: #f0f0f0; padding: 2px 5px; border-radius: 3px; font-size: 0.9em; }\npre code { background: none; padding: 0; }\nblockquote { border-left: 3px solid #ccc; padding-left: 16px; color: #666; }\ntable { border-collapse: collapse; width: 100%; }\nth, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }\nth { background: #f7f7f7; }\nimg { max-width: 100%; }\n</style>\n</head>\n<body>\n' + body + '\n</body>\n</html>';
        }

        window.exportHtml = function() {
            var html = getFullHtml();
            var blob = new Blob([html], { type: 'text/html' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'markdown-export.html';
            a.click();
            URL.revokeObjectURL(url);
            showToast('HTML file downloaded');
        };

        window.copyHtml = function() {
            var html = preview.innerHTML;
            navigator.clipboard.writeText(html).then(function() {
                showToast('HTML copied to clipboard');
            }).catch(function() {
                // Fallback
                var ta = document.createElement('textarea');
                ta.value = html;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('HTML copied to clipboard');
            });
        };

        // --- Toast ---

        function showToast(msg) {
            var toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 2000);
        }

        // --- Keyboard shortcuts ---

        editor.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
                e.preventDefault();
                insertMd('bold');
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'i') {
                e.preventDefault();
                insertMd('italic');
            }
            // Tab support
            if (e.key === 'Tab') {
                e.preventDefault();
                var s = this.selectionStart;
                var end = this.selectionEnd;
                this.value = this.value.substring(0, s) + '    ' + this.value.substring(end);
                this.selectionStart = this.selectionEnd = s + 4;
                render();
            }
        });

        // --- Init with sample content ---

        editor.value = '# Welcome to Markdown Preview\n\nStart typing your **Markdown** here and see the *live preview* on the right.\n\n## Features\n\n- **Bold**, *italic*, and ~~strikethrough~~ text\n- [Links](https://example.com) and inline `code`\n- Lists, blockquotes, tables, and more\n\n> This is a blockquote. It can span multiple lines.\n\n### Code Block\n\n```js\nfunction greet(name) {\n    return `Hello, ${name}!`;\n}\n```\n\n### Table\n\n| Feature | Status |\n| ------- | ------ |\n| Headings | Done |\n| Lists | Done |\n| Tables | Done |\n\n### Task List\n\n- [x] Build markdown parser\n- [x] Add live preview\n- [ ] Take over the world\n\n---\n\nHappy writing!';
        render();
    })();
    </script>
