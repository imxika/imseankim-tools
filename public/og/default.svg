<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="25%" stop-color="#feca57"/>
      <stop offset="50%" stop-color="#48dbfb"/>
      <stop offset="75%" stop-color="#ff9ff3"/>
      <stop offset="100%" stop-color="#54a0ff"/>
    </linearGradient>
    <linearGradient id="topBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="25%" stop-color="#feca57"/>
      <stop offset="50%" stop-color="#48dbfb"/>
      <stop offset="75%" stop-color="#ff9ff3"/>
      <stop offset="100%" stop-color="#54a0ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#4facfe" stop-opacity="0.07"/>
      <stop offset="50%" stop-color="#ff6b6b" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Subtle glow -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#topBar)"/>

  <!-- Bottom subtle line -->
  <line x1="200" y1="628" x2="1000" y2="628" stroke="#222" stroke-width="1"/>

  <!-- Corner dots -->
  <circle cx="28" cy="28" r="3" fill="#222"/>
  <circle cx="1172" cy="28" r="3" fill="#222"/>
  <circle cx="28" cy="602" r="3" fill="#222"/>
  <circle cx="1172" cy="602" r="3" fill="#222"/>

  <!-- Domain -->
  <text x="600" y="210" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="400" letter-spacing="6" fill="#444" text-transform="uppercase">TOOLS.IMSEANKIM.COM</text>

  <!-- Title: Sean's Tools -->
  <text x="600" y="300" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="72" font-weight="200" letter-spacing="12" fill="url(#rainbow)">SEAN'S TOOLS</text>

  <!-- Subtitle -->
  <text x="600" y="350" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="300" letter-spacing="3" fill="#666">20+ Free Online Tools for Designers &amp; Developers</text>

  <!-- Tool icon boxes row -->
  <!-- Design tools -->
  <rect x="148" y="410" width="52" height="52" rx="12" fill="#141414" stroke="#222" stroke-width="1"/>
  <text x="174" y="443" text-anchor="middle" font-size="22">🎨</text>

  <rect x="212" y="410" width="52" height="52" rx="12" fill="#141414" stroke="#222" stroke-width="1"/>
  <text x="238" y="443" text-anchor="middle" font-size="22">🌈</text>

  <rect x="276" y="410" width="52" height="52" rx="12" fill="#141414" stroke="#222" stroke-width="1"/>
  <text x="302" y="443" text-anchor="middle" font-size="22">🔤</text>

  <rect x="340" y="410" width="52" height="52" rx="12" fill="#141414" stroke="#222" stroke-width="1"/>
  <text x="366" y="443" text-anchor="middle" font-size="22">🔲</text>

  <rect x="404" y="410" width="52" height="52" rx="12" fill="#141414" stroke="#222" stroke-width="1"/>
  <text x="430" y="443" text-anchor="middle" font-size="22">📐</text>

  <!-- Divider -->
  <line x1="476" y1="422" x2="476" y2="450" stroke="#333" stroke-width="1"/>

  <!-- Dev tools -->
  <rect x="496" y="410" width="52" height="52" rx="12" fill="#141414" stroke="#222" stroke-width="1"/>
  <text x="522" y="442" text-anchor="middle" font-family="monospace" font-size="14" fill="#555">{ }</text>

  <rect x="560" y="410" width="52" height="52" rx="12" fill="#141414" stroke="#222" stroke-width="1"/>
  <text x="586" y="442" text-anchor="middle" font-family="monospace" font-size="14" fill="#555">.*</text>

  <rect x="624" y="410" width="52" height="52" rx="12" fill="#141414" stroke="#222" stroke-width="1"/>
  <text x="650" y="443" text-anchor="middle" font-size="22">🔑</text>

  <rect x="688" y="410" width="52" height="52" rx="12" fill="#141414" stroke="#222" stroke-width="1"/>
  <text x="714" y="443" text-anchor="middle" font-size="22">🔗</text>

  <!-- Divider -->
  <line x1="760" y1="422" x2="760" y2="450" stroke="#333" stroke-width="1"/>

  <!-- Productivity & media tools -->
  <rect x="780" y="410" width="52" height="52" rx="12" fill="#141414" stroke="#222" stroke-width="1"/>
  <text x="806" y="443" text-anchor="middle" font-size="22">📱</text>

  <rect x="844" y="410" width="52" height="52" rx="12" fill="#141414" stroke="#222" stroke-width="1"/>
  <text x="870" y="443" text-anchor="middle" font-size="22">🔒</text>

  <rect x="908" y="410" width="52" height="52" rx="12" fill="#141414" stroke="#222" stroke-width="1"/>
  <text x="934" y="443" text-anchor="middle" font-size="22">🖼️</text>

  <rect x="972" y="410" width="52" height="52" rx="12" fill="#141414" stroke="#222" stroke-width="1"/>
  <text x="998" y="443" text-anchor="middle" font-size="22">⭐</text>

  <!-- Category labels under icons -->
  <text x="312" y="490" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="3" fill="#333">DESIGN</text>
  <text x="608" y="490" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="3" fill="#333">DEVELOP</text>
  <text x="890" y="490" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" letter-spacing="3" fill="#333">PRODUCTIVITY</text>
</svg>
